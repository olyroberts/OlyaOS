<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Моя система — дашборд</title>
<style>
  :root {
    --bg: #f4f2ec;
    --surface: #ffffff;
    --surface-2: #faf9f5;
    --text: #2c2a26;
    --text-dim: #5f5d57;
    --text-faint: #908d85;
    --gold: #9a7b30;
    --line: rgba(0,0,0,0.09);
    --line-soft: rgba(0,0,0,0.05);
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    line-height: 1.6;
    padding: 0 0 60px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 940px; margin: 0 auto; padding: 0 22px; }

  /* ---- Шапка ---- */
  header {
    padding: 30px 0 18px;
    text-align: center;
  }
  .kicker {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 8px;
  }
  header h1 { font-size: 25px; font-weight: 500; letter-spacing: 0.2px; }
  header .today { font-size: 12.5px; color: var(--text-faint); margin-top: 5px; }
  .header-title-row {
    display: inline-flex; align-items: center; gap: 8px;
  }
  .header-edit-btn {
    font-family: inherit; font-size: 12px; line-height: 1;
    width: 26px; height: 26px; padding: 0; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-faint);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .header-edit-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ---- Полоса сохранения ---- */
  .savebar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 9px; padding: 8px 14px; margin-bottom: 14px;
    font-size: 12px;
  }
  .savebar .status { color: #1d6b51; font-weight: 500; margin-right: auto; }
  .savebar .status.unsaved { color: #a33636; }
  .savebar button {
    font-family: inherit; font-size: 11.5px;
    padding: 5px 11px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--line); background: transparent; color: var(--text-dim);
    transition: all 0.12s;
  }
  .savebar button:hover { border-color: var(--gold); color: var(--text); }
  .savebar button.danger:hover { border-color: #a33636; color: #a33636; }


  /* ---- Полоса таймера (сквозная) ---- */
  .timerbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 16px; margin-bottom: 10px;
  }
  .timer-clock {
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-size: 23px; font-weight: 600; color: var(--text);
    line-height: 1; min-width: 92px;
  }
  .timer-clock.running { color: #1d6b51; }
  .timer-clock.paused  { color: #b18913; }
  .timer-state {
    font-size: 10px; letter-spacing: 0.4px; text-transform: uppercase;
    color: var(--text-faint); margin-top: 3px;
  }
  .timer-clock-block { display: flex; flex-direction: column; }
  .timerbar .spacer { flex: 1; }
  .timerbar button {
    font-family: inherit; font-size: 12px; font-weight: 500;
    padding: 7px 14px; border-radius: 7px; cursor: pointer;
    border: 1px solid transparent; color: #fff; transition: all 0.12s;
  }
  .timerbar button:disabled { opacity: 0.32; cursor: not-allowed; }
  .tb-start  { background: #1d6b51; }
  .tb-start:hover:not(:disabled) { background: #185b44; }
  .tb-pause  { background: #b18913; }
  .tb-pause:hover:not(:disabled) { background: #977311; }
  .tb-stop   { background: #a33636; }
  .tb-stop:hover:not(:disabled)  { background: #8a2c2c; }
  .timerbar button.tb-manual {
    background: var(--surface-2);
    border-color: var(--gold);
    color: var(--gold);
  }
  .timerbar button.tb-manual:hover { background: var(--gold); color: #fff; }

  /* ---- Табы ---- */
  .tabs {
    display: flex; gap: 3px; flex-wrap: wrap;
    border-bottom: 2px solid var(--text);
    margin-bottom: 22px;
  }
  .tab {
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 9px 17px; cursor: pointer;
    background: transparent; border: none; color: var(--text-faint);
    border-radius: 7px 7px 0 0; transition: all 0.12s;
  }
  .tab:hover { background: #ebe8e0; color: var(--text); }
  .tab.active { background: var(--text); color: var(--bg); }
  .tab-page { display: none; }
  .tab-page.active { display: block; animation: fade 0.2s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* ---- Фильтр по сферам ---- */
  .sphere-filter {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .sf-btn {
    font-family: inherit; font-size: 11.5px;
    padding: 5px 12px; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    transition: all 0.12s; display: flex; align-items: center; gap: 6px;
  }
  .sf-btn:hover { border-color: var(--gold); }
  .sf-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .sf-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ---- Обзор: сфера ---- */
  .sphere-block { margin-bottom: 30px; }
  .sphere-head {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 8px; margin-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .sphere-mark {
    width: 24px; height: 24px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .sphere-head h2 { font-size: 17px; font-weight: 500; }
  .sphere-head .s-count { font-size: 11.5px; color: var(--text-faint); margin-left: auto; }

  /* ---- Сетка плиток ---- */
  .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media (max-width: 720px) { .tiles { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .tiles { grid-template-columns: 1fr; } }

  .tile {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 0; cursor: pointer;
    overflow: hidden; position: relative;
    transition: transform 0.12s, box-shadow 0.12s;
    display: flex; flex-direction: column;
  }
  .tile:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .tile.dimmed { opacity: 0.6; }
  .tile-stripe { height: 4px; width: 100%; }
  .tile-body { padding: 13px 15px 14px; flex: 1; display: flex; flex-direction: column; }
  .tile-name {
    font-size: 14px; font-weight: 600; line-height: 1.35;
    display: flex; align-items: flex-start; gap: 6px;
  }
  .tile-key {
    font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase;
    background: #f3e6c4; color: #876a26;
    padding: 2px 6px; border-radius: 10px; font-weight: 600;
    white-space: nowrap; flex-shrink: 0; margin-top: 1px;
  }
  .tile-sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  .tile-stat {
    font-size: 11.5px; color: var(--text-dim);
    margin-top: 10px; padding-top: 9px;
    border-top: 1px dashed var(--line);
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .tile-stat b { color: var(--text); font-weight: 600; }
  .tile-badge {
    font-size: 9.5px; letter-spacing: 0.4px; text-transform: uppercase;
    padding: 2px 7px; border-radius: 10px; font-weight: 500;
  }
  .bg-paused { background: #ebe9e3; color: #807d75; }
  .bg-backlog { background: #f7dcdc; color: #a33636; }

  /* ---- Управление структурой в Обзоре ---- */
  .overview-toolbar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .ov-mode-btn {
    font-family: inherit; font-size: 12px;
    padding: 6px 13px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    transition: all 0.12s;
  }
  .ov-mode-btn:hover { border-color: var(--gold); color: var(--text); }
  .ov-mode-btn.on { background: var(--gold); color: #fff; border-color: var(--gold); }
  .ov-hint { font-size: 11.5px; color: var(--text-faint); }

  .edit-icon-btn {
    font-family: inherit; font-size: 12px; line-height: 1;
    width: 26px; height: 26px; padding: 0;
    border-radius: 6px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s; flex-shrink: 0;
  }
  .edit-icon-btn:hover { border-color: var(--gold); color: var(--text); }
  .edit-icon-btn.del:hover { border-color: #a33636; color: #a33636; }
  .edit-icon-btn.on-date { background: var(--gold); color: #fff; border-color: var(--gold); }
  .edit-icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .sphere-edit-actions { display: flex; gap: 4px; align-items: center; }

  .add-row {
    display: flex; gap: 7px; margin-top: 11px; flex-wrap: wrap;
  }
  .add-row input {
    flex: 1; min-width: 180px;
    font-family: inherit; font-size: 13px;
    padding: 8px 11px; border-radius: 7px;
    border: 1px dashed var(--line); background: var(--surface-2); color: var(--text);
  }
  .add-row input:focus { outline: none; border-style: solid; border-color: var(--gold); background: var(--surface); }
  .add-row button {
    font-family: inherit; font-size: 12px;
    padding: 8px 14px; border-radius: 7px; cursor: pointer;
    border: none; background: var(--text); color: var(--bg);
  }
  .add-sphere-row {
    margin-top: 8px;
    background: var(--surface-2); border: 1px dashed var(--line);
    border-radius: 10px; padding: 14px 16px;
  }
  .add-sphere-row .ar-title { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 500; }

  .tile.editing { cursor: default; }
  .tile.editing:hover { transform: none; box-shadow: none; }
  .tile-edit-bar {
    display: flex; gap: 4px; padding: 7px 10px;
    border-top: 1px dashed var(--line); background: var(--surface-2);
  }
  /* стрелки перемещения */
  .move-arrows { display: inline-flex; gap: 2px; margin-right: 4px; }
  .move-btn {
    font-family: inherit; font-size: 9px; line-height: 1;
    width: 20px; height: 20px; padding: 0;
    border-radius: 5px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .move-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--text); }
  .move-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  /* модалка-редактор */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(20,18,14,0.45);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px;
    padding: 24px; max-width: 440px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .modal label {
    display: block; font-size: 11px; letter-spacing: 0.4px;
    text-transform: uppercase; color: var(--text-faint); margin: 12px 0 5px;
  }
  .modal input, .modal textarea {
    width: 100%; font-family: inherit; font-size: 13.5px;
    padding: 9px 11px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text);
  }
  .modal input:focus, .modal textarea:focus { outline: none; border-color: var(--gold); background: var(--surface); }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .modal-actions button {
    font-family: inherit; font-size: 13px;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
  }
  .modal-actions .btn-save { background: var(--text); color: var(--bg); border: none; }
  .modal-actions .btn-cancel { background: transparent; color: var(--text-dim); border: 1px solid var(--line); }

  /* ---- Страница проекта (overlay) ---- */
  .proj-overlay {
    position: fixed; inset: 0; z-index: 80;
    background: var(--bg); overflow-y: auto;
    display: none;
  }
  .proj-overlay.open { display: block; animation: fade 0.2s ease; }
  .proj-inner { max-width: 760px; margin: 0 auto; padding: 0 22px 80px; }

  .proj-topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 22px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 5;
    margin: 0 -22px 8px;
    background: rgba(244,242,236,0.94);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line-soft);
  }
  .proj-back {
    font-family: inherit; font-size: 12.5px; font-weight: 500;
    padding: 7px 13px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    transition: all 0.12s;
  }
  .proj-back:hover { border-color: var(--gold); color: var(--text); }
  .proj-topbar .spacer { flex: 1; }
  .proj-edit-toggle {
    font-family: inherit; font-size: 12px;
    padding: 7px 13px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    transition: all 0.12s;
  }
  .proj-edit-toggle:hover { border-color: var(--gold); color: var(--text); }
  .proj-edit-toggle.on { background: var(--gold); color: #fff; border-color: var(--gold); }

  .proj-head {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 12px; overflow: hidden; margin-bottom: 22px;
  }
  .proj-head-stripe { height: 5px; width: 100%; }
  .proj-head-body { padding: 18px 22px 20px; }
  .proj-head-top { display: flex; align-items: flex-start; gap: 10px; }
  .proj-sphere-tag {
    font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase;
    color: #fff; padding: 3px 9px; border-radius: 11px;
    font-weight: 600; white-space: nowrap;
  }
  .proj-key-tag {
    font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase;
    background: #f3e6c4; color: #876a26;
    padding: 3px 9px; border-radius: 11px; font-weight: 600; white-space: nowrap;
  }
  .proj-status-tag {
    font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase;
    padding: 3px 9px; border-radius: 11px; font-weight: 600; white-space: nowrap;
  }
  .proj-title {
    font-size: 22px; font-weight: 600; line-height: 1.3;
    margin: 12px 0 4px;
  }
  .proj-goal-label {
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--gold); margin: 14px 0 5px;
  }
  .proj-goal { font-size: 14px; color: var(--text-dim); line-height: 1.6; }
  .proj-goal.empty { color: var(--text-faint); font-style: italic; }
  .proj-head-edit {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px dashed var(--line);
    display: flex; gap: 7px; flex-wrap: wrap;
  }
  .proj-head-edit button {
    font-family: inherit; font-size: 12px;
    padding: 6px 12px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text-dim);
    transition: all 0.12s;
  }
  .proj-head-edit button:hover { border-color: var(--gold); color: var(--text); }

  /* счётчик прогресса */
  .proj-progress {
    display: flex; align-items: center; gap: 12px;
    margin: 12px 0 0; font-size: 12px; color: var(--text-dim);
  }
  .proj-progress-bar {
    flex: 1; height: 7px; border-radius: 4px;
    background: var(--line-soft); overflow: hidden; min-width: 80px;
  }
  .proj-progress-fill { height: 100%; border-radius: 4px; transition: width 0.25s; }

  /* секция задач */
  .tasks-section-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 6px;
  }
  .tasks-section-head h3 { font-size: 15px; font-weight: 600; }
  .tasks-section-head .t-count { font-size: 11.5px; color: var(--text-faint); }
  .tasks-section-hint { font-size: 11.5px; color: var(--text-faint); margin-bottom: 14px; }

  /* группа задач по типу */
  .task-group { margin-bottom: 20px; }
  .task-group-label {
    font-size: 10.5px; letter-spacing: 0.6px; text-transform: uppercase;
    font-weight: 600; margin-bottom: 8px;
    display: flex; align-items: center; gap: 7px;
  }
  .tg-dot { width: 8px; height: 8px; border-radius: 3px; flex-shrink: 0; }
  .tg-rep   { color: #1d6b51; } .tg-rep   .tg-dot { background: #1d6b51; }
  .tg-once  { color: #45528f; } .tg-once  .tg-dot { background: #45528f; }
  .tg-cond  { color: #9a7b30; } .tg-cond  .tg-dot { background: #9a7b30; }
  .tg-back  { color: #a33636; } .tg-back  .tg-dot { background: #a33636; }
  .tg-none  { color: var(--text-faint); } .tg-none .tg-dot { background: var(--text-faint); }

  /* карточка задачи */
  .task-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; margin-bottom: 8px; overflow: hidden;
  }
  .task-card.t-done { opacity: 0.6; }
  .task-main {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 13px;
  }
  .task-check {
    width: 19px; height: 19px; border-radius: 6px; flex-shrink: 0;
    border: 1.5px solid var(--line); background: var(--surface-2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff; transition: all 0.12s; margin-top: 1px;
  }
  .task-check:hover { border-color: var(--gold); }
  .task-check.checked { background: #1d6b51; border-color: #1d6b51; }
  .task-text-block { flex: 1; min-width: 0; }
  .task-name { font-size: 13.5px; line-height: 1.45; }
  .task-pri { font-size: 11px; vertical-align: 1px; }
  .task-card.t-done .task-name { text-decoration: line-through; }
  .task-hint {
    font-size: 11px; color: var(--text-faint); margin-top: 2px;
    font-style: italic;
  }
  /* плашка даты задачи */
  .task-date {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10.5px; font-weight: 600;
    padding: 2px 8px; border-radius: 9px;
    background: #e9e3d2; color: #6f5a22;
    white-space: nowrap;
  }
  .task-date.unplanned {
    background: var(--surface-2); color: var(--text-faint);
    font-weight: 500; border: 1px dashed var(--line);
  }
  .task-date.rhythm {
    background: #dceee6; color: #1d6b51;
  }
  /* блок выбора даты в режиме правки */
  .task-date-edit {
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    padding: 8px 13px; background: var(--surface-2);
    border-top: 1px dashed var(--line);
  }
  .task-date-edit label {
    font-size: 10px; letter-spacing: 0.4px; text-transform: uppercase;
    color: var(--text-faint);
  }
  .task-date-edit input[type="date"],
  .task-date-edit input[type="time"] {
    font-family: inherit; font-size: 12px;
    padding: 5px 8px; border-radius: 6px;
    border: 1px solid var(--line); background: var(--surface); color: var(--text);
  }
  .task-date-edit input:focus { outline: none; border-color: var(--gold); }
  .task-date-edit .clear-date {
    font-family: inherit; font-size: 11px;
    padding: 5px 9px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
  }
  .task-date-edit .clear-date:hover { border-color: #a33636; color: #a33636; }
  .task-date-edit .rhythm-note {
    font-size: 11px; color: #1d6b51; font-weight: 500;
  }
  .task-type-pill {
    font-size: 9px; letter-spacing: 0.4px; text-transform: uppercase;
    padding: 2px 7px; border-radius: 9px; font-weight: 600;
    white-space: nowrap; flex-shrink: 0; margin-top: 1px;
  }
  .ttp-rep  { background: #dceee6; color: #1d6b51; }
  .ttp-once { background: #dee1f0; color: #45528f; }
  .ttp-cond { background: #f3e9d2; color: #876a26; }
  .ttp-back { background: #f7dcdc; color: #a33636; }
  .ttp-none { background: #ebe9e3; color: #807d75; }

  .task-meta-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 5px; flex-wrap: wrap;
  }
  .subs-toggle {
    font-family: inherit; font-size: 11px;
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); padding: 0; display: inline-flex;
    align-items: center; gap: 4px;
  }
  .subs-toggle:hover { color: var(--gold); }
  .subs-arrow { font-size: 8px; transition: transform 0.15s; }
  .subs-toggle.open .subs-arrow { transform: rotate(90deg); }

  /* подзадачи */
  .subs-wrap {
    border-top: 1px dashed var(--line);
    background: var(--surface-2); padding: 8px 13px 10px 13px;
  }
  .sub-row {
    display: flex; align-items: flex-start; gap: 9px;
    padding: 5px 0;
  }
  .sub-check {
    width: 16px; height: 16px; border-radius: 5px; flex-shrink: 0;
    border: 1.5px solid var(--line); background: var(--surface);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #fff; transition: all 0.12s; margin-top: 1px;
  }
  .sub-check:hover { border-color: var(--gold); }
  .sub-check.checked { background: #1d6b51; border-color: #1d6b51; }
  .sub-name { flex: 1; font-size: 12.5px; line-height: 1.4; color: var(--text-dim); }
  .sub-row.s-done .sub-name { text-decoration: line-through; color: var(--text-faint); }
  .sub-mini-btn {
    font-family: inherit; font-size: 10px; line-height: 1;
    width: 19px; height: 19px; padding: 0; border-radius: 5px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s; flex-shrink: 0;
  }
  .sub-mini-btn:hover { border-color: var(--gold); color: var(--text); }
  .sub-mini-btn.del:hover { border-color: #a33636; color: #a33636; }
  .sub-mini-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .sub-actions { display: flex; gap: 3px; flex-shrink: 0; }
  .sub-add-row {
    display: flex; gap: 6px; margin-top: 6px;
  }
  .sub-add-row input {
    flex: 1; font-family: inherit; font-size: 12px;
    padding: 6px 9px; border-radius: 6px;
    border: 1px dashed var(--line); background: var(--surface); color: var(--text);
  }
  .sub-add-row input:focus { outline: none; border-style: solid; border-color: var(--gold); }
  .sub-add-row button {
    font-family: inherit; font-size: 11px;
    padding: 6px 11px; border-radius: 6px; cursor: pointer;
    border: none; background: var(--text); color: var(--bg);
  }

  /* панель правки задачи */
  .task-edit-bar {
    display: flex; gap: 4px; padding: 6px 10px;
    border-top: 1px dashed var(--line); background: var(--surface-2);
    align-items: center;
  }
  .task-edit-bar select {
    font-family: inherit; font-size: 11px;
    padding: 4px 7px; border-radius: 6px;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    cursor: pointer;
  }
  .task-edit-bar select:focus { outline: none; border-color: var(--gold); }
  .task-edit-bar .te-spacer { flex: 1; }

  /* строка добавления задачи */
  .task-add-box {
    background: var(--surface-2); border: 1px dashed var(--line);
    border-radius: 10px; padding: 13px 14px; margin-top: 8px;
  }
  .task-add-box .tab-title {
    font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 500;
  }
  .task-add-box .add-row { margin-top: 0; }
  .task-add-box select {
    font-family: inherit; font-size: 12.5px;
    padding: 8px 10px; border-radius: 7px;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    cursor: pointer;
  }
  .task-add-box select:focus { outline: none; border-color: var(--gold); }

  .tasks-empty {
    text-align: center; padding: 30px 20px;
    color: var(--text-faint); font-size: 13px;
  }

  /* ---- Таб «Время» ---- */
  .time-modeswitch {
    display: inline-flex; gap: 0; margin-bottom: 14px;
    border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
  }
  .time-modeswitch button {
    font-family: inherit; font-size: 12px;
    padding: 7px 16px; cursor: pointer; border: none;
    background: var(--surface); color: var(--text-dim);
    transition: all 0.12s;
  }
  .time-modeswitch button + button { border-left: 1px solid var(--line); }
  .time-modeswitch button.on { background: var(--gold); color: #fff; }

  .time-nav {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; padding: 9px 14px; margin-bottom: 16px;
  }
  .time-nav-btn {
    font-family: inherit; font-size: 15px; line-height: 1;
    width: 32px; height: 32px; padding: 0; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s; flex-shrink: 0;
  }
  .time-nav-btn:hover { border-color: var(--gold); color: var(--text); }
  .time-nav-label { flex: 1; text-align: center; }
  .time-nav-label .tn-range { font-size: 14.5px; font-weight: 600; }
  .time-nav-label .tn-sub { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
  .time-nav-label .tn-total {
    color: var(--gold); font-weight: 600;
  }
  .time-today-btn {
    font-family: inherit; font-size: 11.5px;
    padding: 6px 11px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text-dim);
    transition: all 0.12s; flex-shrink: 0;
  }
  .time-today-btn:hover { border-color: var(--gold); color: var(--text); }
  .time-today-btn.hidden { visibility: hidden; }

  .time-section-title {
    font-size: 13px; font-weight: 600; margin: 18px 0 10px;
  }

  /* сводка по сферам/проектам — полоски-доли */
  .time-bar-row {
    margin-bottom: 11px;
  }
  .time-bar-head {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 12.5px; margin-bottom: 4px;
  }
  .time-bar-head .tbh-name { flex: 1; font-weight: 500; min-width: 0; }
  .time-bar-head .tbh-val { color: var(--text-dim); font-weight: 600; }
  .time-bar-head .tbh-pct { color: var(--text-faint); font-size: 11px; }
  .time-bar-track {
    height: 9px; border-radius: 5px; background: var(--line-soft);
    overflow: hidden;
  }
  .time-bar-fill { height: 100%; border-radius: 5px; transition: width 0.25s; }

  .time-proj-sub {
    margin: 5px 0 0 14px; padding-left: 10px;
    border-left: 2px solid var(--line);
  }
  .time-proj-sub .tps-row {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 11.5px; padding: 2px 0; color: var(--text-dim);
  }
  .time-proj-sub .tps-name { flex: 1; min-width: 0; }
  .time-proj-sub .tps-val { font-weight: 600; }

  /* список записей по дням */
  .time-day-group { margin-bottom: 16px; }
  .time-day-label {
    font-size: 11.5px; font-weight: 600; color: var(--text-dim);
    margin-bottom: 7px; display: flex; align-items: baseline; gap: 8px;
  }
  .time-day-label .tdl-sum { color: var(--text-faint); font-weight: 500; }
  .time-entry {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; margin-bottom: 7px;
    display: flex; align-items: flex-start; gap: 11px;
    padding: 11px 13px;
  }
  .time-entry-dur {
    font-size: 13px; font-weight: 700; color: #6f5a22;
    background: #e9e3d2; padding: 3px 9px; border-radius: 8px;
    white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums;
  }
  .time-entry-body { flex: 1; min-width: 0; }
  .time-entry-top {
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
  }
  .time-entry-proj {
    font-size: 11px; color: #fff; padding: 2px 8px; border-radius: 9px;
    font-weight: 500; white-space: nowrap;
  }
  .time-entry-task { font-size: 12.5px; color: var(--text-dim); }
  .time-entry-note {
    font-size: 12px; color: var(--text); margin-top: 4px; line-height: 1.45;
  }
  .time-entry-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .time-mini-btn {
    font-family: inherit; font-size: 10px; line-height: 1;
    width: 24px; height: 24px; padding: 0; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .time-mini-btn:hover { border-color: var(--gold); color: var(--text); }
  .time-mini-btn.del:hover { border-color: #a33636; color: #a33636; }

  .time-empty {
    text-align: center; padding: 46px 20px;
    color: var(--text-faint); font-size: 13.5px;
  }
  .time-empty .big { font-size: 32px; margin-bottom: 12px; }

  /* поля окна записи времени */
  .te-modal-field { margin: 11px 0; }
  .te-modal-field label {
    font-size: 11px; letter-spacing: 0.4px; text-transform: uppercase;
    color: var(--text-faint); display: block; margin-bottom: 4px;
  }
  .te-modal-field input, .te-modal-field select, .te-modal-field textarea {
    font-family: inherit; font-size: 13px; width: 100%;
    padding: 8px 10px; border-radius: 7px; box-sizing: border-box;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text);
  }
  .te-modal-field textarea { resize: vertical; min-height: 52px; }
  .te-modal-field input:focus, .te-modal-field select:focus,
  .te-modal-field textarea:focus { outline: none; border-color: var(--gold); }
  .te-modal-row { display: flex; gap: 10px; }
  .te-modal-row .te-modal-field { flex: 1; }
  .te-dur-display {
    font-size: 13px; color: var(--text-dim);
    background: #e9e3d2; padding: 8px 11px; border-radius: 7px;
    margin-bottom: 4px;
  }
  .te-dur-display b { color: #6f5a22; font-size: 15px; }

  /* ---- Таб «Календарь» ---- */
  .cal-nav {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; padding: 9px 14px; margin-bottom: 16px;
  }
  .cal-nav-btn {
    font-family: inherit; font-size: 15px; line-height: 1;
    width: 32px; height: 32px; padding: 0;
    border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s; flex-shrink: 0;
  }
  .cal-nav-btn:hover { border-color: var(--gold); color: var(--text); }
  .cal-nav-label { flex: 1; text-align: center; }
  .cal-nav-label .cn-month { font-size: 14.5px; font-weight: 600; }
  .cal-nav-label .cn-sub { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
  .cal-today-btn {
    font-family: inherit; font-size: 11.5px;
    padding: 6px 11px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text-dim);
    transition: all 0.12s; flex-shrink: 0;
  }
  .cal-today-btn:hover { border-color: var(--gold); color: var(--text); }
  .cal-today-btn.hidden { visibility: hidden; }

  .cal-summary {
    font-size: 12px; color: var(--text-dim); margin-bottom: 14px;
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .cal-summary b { color: var(--text); }

  /* сетка */
  .cal-grid {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 11px; overflow: hidden;
  }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    background: var(--surface-2); border-bottom: 1px solid var(--line);
  }
  .cal-weekdays div {
    text-align: center; font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.4px; text-transform: uppercase;
    color: var(--text-faint); padding: 8px 2px;
  }
  .cal-weekdays div.cw-end { color: #a3683a; }
  .cal-cells {
    display: grid; grid-template-columns: repeat(7, 1fr);
  }
  .cal-cell {
    min-height: 74px; border-right: 1px solid var(--line-soft);
    border-bottom: 1px solid var(--line-soft);
    padding: 5px 6px; cursor: pointer; position: relative;
    transition: background 0.1s; display: flex; flex-direction: column;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell:hover { background: var(--surface-2); }
  .cal-cell.cc-blank { background: var(--surface-2); cursor: default; opacity: 0.5; }
  .cal-cell.cc-blank:hover { background: var(--surface-2); }
  .cal-cell.cc-today { background: #f6f1e2; }
  .cal-cell.cc-today:hover { background: #f1ead4; }
  .cal-cell.cc-selected { box-shadow: inset 0 0 0 2px var(--gold); }
  .cal-cell.cc-other { opacity: 0.4; }
  .cal-daynum {
    font-size: 12px; font-weight: 600; color: var(--text-dim);
    margin-bottom: 3px;
  }
  .cal-cell.cc-today .cal-daynum {
    background: var(--gold); color: #fff;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .cal-dots { display: flex; flex-wrap: wrap; gap: 3px; margin-top: auto; }
  .cal-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  .cal-dot.cd-crit { background: #c0392b; }
  .cal-dot.cd-imp  { background: #d4a02a; }
  .cal-dot.cd-norm { background: #9b988f; }
  .cal-dot.cd-done { background: #1d6b51; opacity: 0.5; }
  .cal-count {
    font-size: 10px; color: var(--text-faint); margin-top: 3px;
  }
  .cal-count.has-crit { color: #a33636; font-weight: 600; }

  /* раскрытый список дня под календарём */
  .cal-day-panel {
    margin-top: 16px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 11px;
    overflow: hidden;
  }
  .cal-day-panel-head {
    padding: 12px 15px; border-bottom: 1px solid var(--line);
    background: var(--surface-2);
    display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap;
  }
  .cal-day-panel-head h3 { font-size: 14.5px; font-weight: 600; }
  .cal-day-panel-head .cdp-count { font-size: 11.5px; color: var(--text-faint); }
  .cal-day-panel-body { padding: 10px 15px 14px; }
  .cal-day-item {
    display: flex; align-items: flex-start; gap: 9px;
    padding: 8px 0; border-top: 1px dashed var(--line-soft);
  }
  .cal-day-item:first-child { border-top: none; }
  .cal-day-item.cdi-done { opacity: 0.55; }
  .cal-day-item-icon { font-size: 11px; margin-top: 2px; flex-shrink: 0; }
  .cal-day-item-body { flex: 1; min-width: 0; }
  .cal-day-item-name { font-size: 13px; line-height: 1.4; }
  .cal-day-item.cdi-done .cal-day-item-name { text-decoration: line-through; }
  .cal-day-item-meta {
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    margin-top: 3px;
  }
  .cal-day-item-proj {
    font-size: 10px; color: #fff; padding: 2px 7px; border-radius: 8px;
    font-weight: 500;
  }
  .cal-day-item-time {
    font-size: 10.5px; font-weight: 600; color: #6f5a22;
    background: #e9e3d2; padding: 1px 6px; border-radius: 7px;
  }
  .cal-day-goto {
    font-family: inherit; font-size: 10.5px;
    padding: 4px 9px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    transition: all 0.12s; flex-shrink: 0;
  }
  .cal-day-goto:hover { border-color: var(--gold); color: var(--text); }
  .cal-day-empty {
    font-size: 12.5px; color: var(--text-faint);
    text-align: center; padding: 14px 8px;
  }
  .cal-hint {
    font-size: 11.5px; color: var(--text-faint);
    text-align: center; margin-top: 14px;
  }

  /* ---- Таб «День» ---- */
  .day-nav {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; padding: 9px 14px; margin-bottom: 16px;
  }
  .day-nav-btn {
    font-family: inherit; font-size: 15px; line-height: 1;
    width: 32px; height: 32px; padding: 0;
    border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s; flex-shrink: 0;
  }
  .day-nav-btn:hover { border-color: var(--gold); color: var(--text); }
  .day-nav-label { flex: 1; text-align: center; }
  .day-nav-label .dn-date { font-size: 14.5px; font-weight: 600; }
  .day-nav-label .dn-sub { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
  .day-nav-label .dn-sub.is-today { color: #1d6b51; font-weight: 600; }
  .day-today-btn {
    font-family: inherit; font-size: 11.5px;
    padding: 6px 11px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text-dim);
    transition: all 0.12s; flex-shrink: 0;
  }
  .day-today-btn:hover { border-color: var(--gold); color: var(--text); }
  .day-today-btn.hidden { visibility: hidden; }

  .day-summary {
    font-size: 12px; color: var(--text-dim);
    margin-bottom: 16px; display: flex; gap: 14px; flex-wrap: wrap;
  }
  .day-summary b { color: var(--text); }
  .day-summary .ds-done { color: #1d6b51; }

  /* группа приоритета */
  .day-group { margin-bottom: 18px; }
  .day-group-label {
    font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase;
    font-weight: 600; margin-bottom: 8px;
    display: flex; align-items: center; gap: 7px;
  }
  .dg-crit { color: #a33636; }
  .dg-imp  { color: #9a7b30; }
  .dg-norm { color: var(--text-dim); }
  .dg-done { color: #1d6b51; }

  /* карточка дела дня */
  .day-task {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; margin-bottom: 8px; overflow: hidden;
  }
  .day-task.dt-done { opacity: 0.62; }
  .day-task-main {
    display: flex; align-items: flex-start; gap: 11px;
    padding: 12px 13px;
  }
  .day-check {
    width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
    border: 2px solid var(--line); background: var(--surface-2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: #fff; transition: all 0.12s; margin-top: 1px;
  }
  .day-check:hover { border-color: var(--gold); }
  .day-check.checked { background: #1d6b51; border-color: #1d6b51; }
  .day-task-body { flex: 1; min-width: 0; }
  .day-task-top { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; }
  .day-task-name { font-size: 14px; line-height: 1.4; font-weight: 500; }
  .day-task.dt-done .day-task-name { text-decoration: line-through; font-weight: 400; }
  .day-task-time {
    font-size: 11.5px; font-weight: 600; color: #6f5a22;
    background: #e9e3d2; padding: 1px 7px; border-radius: 8px;
    white-space: nowrap;
  }
  .day-task-meta {
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    margin-top: 4px;
  }
  .day-proj-tag {
    font-size: 10.5px; color: #fff; padding: 2px 8px; border-radius: 9px;
    font-weight: 500; white-space: nowrap;
  }
  .day-rep-tag {
    font-size: 10px; letter-spacing: 0.3px;
    background: #dceee6; color: #1d6b51;
    padding: 2px 7px; border-radius: 9px; font-weight: 600;
  }
  .day-task-hint {
    font-size: 11px; color: var(--text-faint); font-style: italic;
    margin-top: 3px;
  }
  .day-subs-line {
    font-size: 11px; color: var(--text-dim); margin-top: 4px;
  }
  .day-subs-line .dsl-bar {
    display: inline-block; width: 46px; height: 5px; border-radius: 3px;
    background: var(--line-soft); vertical-align: middle; margin: 0 5px;
    overflow: hidden;
  }
  .day-subs-line .dsl-fill {
    display: block; height: 100%; background: #1d6b51; border-radius: 3px;
  }

  /* действия дела */
  .day-task-actions {
    display: flex; gap: 5px; padding: 7px 11px;
    border-top: 1px dashed var(--line); background: var(--surface-2);
    align-items: center; flex-wrap: wrap;
  }
  .day-act-btn {
    font-family: inherit; font-size: 11px;
    padding: 5px 10px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    transition: all 0.12s;
  }
  .day-act-btn:hover { border-color: var(--gold); color: var(--text); }
  .day-act-btn.move:hover { border-color: #45528f; color: #45528f; }
  .day-act-btn .ab-ico { margin-right: 3px; }
  .day-act-btn.arrow {
    padding: 5px 8px; min-width: 26px; text-align: center;
  }

// ===== Всплывающее уведомление (мягкая подсказка пользователю) =====
let noticeTimer = null;
function showErrorBar(msg) {
  let bar = document.getElementById('app-notice');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'app-notice';
    bar.style.cssText = 'position:fixed;left:50%;bottom:24px;transform:translateX(-50%);' +
      'z-index:9999;background:#3a3733;color:#fff;' +
      'font:13px/1.45 system-ui,-apple-system,sans-serif;' +
      'padding:11px 18px;border-radius:9px;max-width:90%;' +
      'box-shadow:0 6px 22px rgba(0,0,0,0.28);text-align:center;';
    if (document.body) document.body.appendChild(bar);
    else document.addEventListener('DOMContentLoaded', function () {
      if (!document.getElementById('app-notice')) document.body.appendChild(bar);
    });
  }
  bar.textContent = String(msg);
  bar.style.display = 'block';
  if (noticeTimer) clearTimeout(noticeTimer);
  noticeTimer = setTimeout(function () {
    const b = document.getElementById('app-notice');
    if (b) b.style.display = 'none';
  }, 4000);
}


// генератор коротких уникальных id (объявлен до T() — используется при создании задач)
function genId() {
  return 't' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

<script>
// ===== СОСТОЯНИЕ =====
const STORAGE_KEY = 'olyaSystemDashboard_v1';
let state = null;

function defaultState() {
  return {
    appKicker: 'Моя система',
    appTitle: 'Рабочий дашборд',
    spheres: JSON.parse(JSON.stringify(STARTER_SPHERES)),
    projects: JSON.parse(JSON.stringify(STARTER_PROJECTS)),
    log: [],                 // записи учёта времени
    dayLog: [],              // выполненные дела дня: {date, projectNum, taskName, ...}
    dayPlan: {},             // правки плана по датам: { 'YYYY-MM-DD': {order:[], removed:[], moved:{}} }
    weekOrder: [],           // свой порядок плиток в табе «Неделя» (номера проектов)
    timer: { running: false, startedAt: null, accumMs: 0 },
    lastTab: 'week',
    sphereFilter: 'all'
  };
}

// приводим задачу к актуальной схеме (миграция старых сохранений)
function normalizeTask(t) {
  if (typeof t.date !== 'string') t.date = '';
  if (typeof t.time !== 'string') t.time = '';
  if (typeof t.rhythm !== 'string') t.rhythm = (t.type === 'rep' ? 'daily' : '');
  if (['crit','imp','norm'].indexOf(t.priority) === -1) t.priority = 'norm';
  if (!Array.isArray(t.subs)) t.subs = [];
  if (!t.tid) t.tid = genId();
  delete t.done;   // выполнение задачи больше не живёт на странице проекта
  return t;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state = JSON.parse(raw);
      if (!state.spheres)  state.spheres  = JSON.parse(JSON.stringify(STARTER_SPHERES));
      if (!state.projects) state.projects = JSON.parse(JSON.stringify(STARTER_PROJECTS));
      if (!state.log)      state.log = [];
      if (!state.dayLog)   state.dayLog = [];
      if (!state.dayPlan)  state.dayPlan = {};
      if (!Array.isArray(state.weekOrder)) state.weekOrder = [];
      if (typeof state.appKicker !== 'string') state.appKicker = 'Моя система';
      if (typeof state.appTitle !== 'string') state.appTitle = 'Рабочий дашборд';
      if (!state.timer)    state.timer = { running: false, startedAt: null, accumMs: 0 };
      if (!state.sphereFilter) state.sphereFilter = 'all';
      // миграция: дотягиваем задачи до новой схемы
      state.projects.forEach(function (p) {
        if (Array.isArray(p.tasks)) p.tasks.forEach(normalizeTask);
      });
    } else {
      state = defaultState();
    }
  } catch (e) {
    console.error('Ошибка загрузки:', e);
    state = defaultState();
  }
}

let saveTimer = null;
function saveState(immediate) {
  setSaveStatus('Сохранение…', true);
  if (saveTimer) clearTimeout(saveTimer);
  const doSave = function () {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setSaveStatus('Сохранено', false);
    } catch (e) {
      setSaveStatus('Ошибка сохранения', true);
      console.error(e);
    }
  };
  if (immediate) doSave();
  else saveTimer = setTimeout(doSave, 400);
}

function setSaveStatus(text, unsaved) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.textContent = text;
  el.classList.toggle('unsaved', !!unsaved);
}

// ===== ТАБЫ =====
function showTab(name) {
  document.querySelectorAll('.tab-page').forEach(function (p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
  const page = document.getElementById('page-' + name);
  const tab  = document.querySelector('.tab[data-tab="' + name + '"]');
  if (page) page.classList.add('active');
  if (tab)  tab.classList.add('active');
  if (name === 'week') renderWeek();
  if (name === 'day') renderDay();
  if (name === 'calendar') renderCalendar();
  if (name === 'time') renderTimeLog();
  state.lastTab = name;
  saveState();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== ВСПОМОГАТЕЛЬНОЕ =====
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function sphereById(id) {
  return state.spheres.find(function (s) { return s.id === id; });
}
function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}
function projectStats(p) {
  let typed = 0, subs = 0, subsDone = 0;
  p.tasks.forEach(function (t) {
    if (t.type) typed++;
    if (t.subs) { subs += t.subs.length; subsDone += t.subs.filter(function (s){return s.done;}).length; }
  });
  return { total: p.tasks.length, typed: typed, subs: subs, subsDone: subsDone };
}

// ===== ТАЙМЕР (сквозной) =====
function timerLiveMs() {
  let ms = state.timer.accumMs;
  if (state.timer.running && state.timer.startedAt) {
    ms += Date.now() - state.timer.startedAt;
  }
  return ms;
}
function fmtClock(ms) {
  const total = Math.floor(ms / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}
function timerStart() {
  if (state.timer.running) return;
  state.timer.running = true;
  state.timer.startedAt = Date.now();
  saveState();
  renderTimer();
  startTicker();
}
function timerPause() {
  if (!state.timer.running) return;
  state.timer.accumMs += Date.now() - state.timer.startedAt;
  state.timer.running = false;
  state.timer.startedAt = null;
  saveState();
  renderTimer();
}
function timerStop() {
  // фиксируем накопленное и открываем окно записи
  if (state.timer.running) {
    state.timer.accumMs += Date.now() - state.timer.startedAt;
    state.timer.running = false;
    state.timer.startedAt = null;
  }
  const ms = state.timer.accumMs;
  saveState();
  renderTimer();
  if (ms < 1000) { resetTimer(); return; }   // ничего не насчитано
  openStopEntry(ms);
}
function resetTimer() {
  state.timer = { running: false, startedAt: null, accumMs: 0 };
  saveState();
  renderTimer();
}
// ===== ШАПКА (редактируемые названия) =====
function renderHeader() {
  const k = document.getElementById('app-kicker');
  const t = document.getElementById('app-title');
  if (k) k.textContent = state.appKicker || 'Моя система';
  if (t) t.textContent = state.appTitle || 'Рабочий дашборд';
}
function editHeader() {
  openModal('Название дашборда', [
    { key: 'kicker', label: 'Надстрочник (мелкий текст сверху)', value: state.appKicker || '' },
    { key: 'title',  label: 'Заголовок', value: state.appTitle || '' }
  ], function (vals) {
    state.appKicker = vals.kicker.trim() || 'Моя система';
    state.appTitle  = vals.title.trim()  || 'Рабочий дашборд';
    saveState(true);
    renderHeader();
  });
}

function renderTimer() {
  const clock = document.getElementById('timer-clock');
  const stateEl = document.getElementById('timer-state');
  const bStart = document.getElementById('tb-start');
  const bPause = document.getElementById('tb-pause');
  const bStop  = document.getElementById('tb-stop');
  if (!clock) return;
  clock.textContent = fmtClock(timerLiveMs());
  clock.classList.toggle('running', state.timer.running);
  clock.classList.toggle('paused', !state.timer.running && state.timer.accumMs > 0);
  if (state.timer.running) {
    stateEl.textContent = 'идёт';
    bStart.disabled = true; bPause.disabled = false; bStop.disabled = false;
  } else if (state.timer.accumMs > 0) {
    stateEl.textContent = 'на паузе';
    bStart.disabled = false; bPause.disabled = true; bStop.disabled = false;
  } else {
    stateEl.textContent = 'остановлен';
    bStart.disabled = false; bPause.disabled = true; bStop.disabled = true;
  }
}
let ticker = null;
function startTicker() {
  if (ticker) return;
  ticker = setInterval(function () {
    if (!state.timer.running) { clearInterval(ticker); ticker = null; return; }
    const clock = document.getElementById('timer-clock');
    if (clock) clock.textContent = fmtClock(timerLiveMs());
  }, 1000);
}

// окно после остановки таймера (время уже насчитано)
function openStopEntry(ms) {
  const minutes = Math.max(1, Math.round(ms / 60000));
  openTimeEntryModal({
    mode: 'stop',
    minutes: minutes,
    fixedDuration: true,           // длительность с таймера — не редактируется
    date: todayISO(),
    onSaved: function () { resetTimer(); },
    onCancel: function () { resetTimer(); }
  });
}

// окно ручного ввода (с нуля)
function openManualEntry() {
  openTimeEntryModal({
    mode: 'manual',
    minutes: 30,
    fixedDuration: false,
    date: todayISO()
  });
}

// окно редактирования существующей записи
function openTimeEntryEdit(id) {
  const rec = state.log.find(function (r) { return r.id === id; });
  if (!rec) return;
  openTimeEntryModal({
    mode: 'edit',
    editId: id,
    minutes: rec.minutes,
    fixedDuration: false,
    date: rec.date,
    projectNum: rec.projectNum,
    taskTid: rec.taskTid,
    note: rec.note

}

// универсальное окно записи времени
function openTimeEntryModal(opts) {
  opts = opts || {};
  const minutes = opts.minutes || 30;
  const h = Math.floor(minutes / 60), m = minutes % 60;

  // список проектов (активные + backlog, без paused), сгруппированы по сферам
  let projOpts = '<option value="">— выбери проект —</option>';
  state.spheres.forEach(function (s) {
    const inSphere = state.projects.filter(function (p) {
      return p.sphere === s.id && p.status !== 'paused';
    });
    if (!inSphere.length) return;
    projOpts += '<optgroup label="' + escapeHtml(s.id + ' · ' + s.name) + '">';
    inSphere.forEach(function (p) {
      projOpts += '<option value="' + p.num + '"' +
        (opts.projectNum === p.num ? ' selected' : '') + '>' +
        escapeHtml(p.short) + '</option>';
    });
    projOpts += '</optgroup>';
  });

  let durHtml;
  if (opts.fixedDuration) {
    durHtml = '<div class="te-dur-display">Засечено таймером: <b>' +
      (h > 0 ? h + ' ч ' : '') + m + ' мин</b></div>';
  } else {
    durHtml = '<div class="te-modal-row">' +
      '<div class="te-modal-field"><label>Часы</label>' +
        '<input type="number" id="te-hours" min="0" max="24" value="' + h + '"></div>' +
      '<div class="te-modal-field"><label>Минуты</label>' +
        '<input type="number" id="te-mins" min="0" max="59" value="' + m + '"></div>' +
      '</div>';
  }

  const titleMap = { stop: 'Запись времени', manual: 'Ввод времени вручную', edit: 'Правка записи' };
  const bodyHtml =
    durHtml +
    '<div class="te-modal-field"><label>Дата</label>' +
      '<input type="date" id="te-date" value="' + escapeHtml(opts.date || todayISO()) + '"></div>' +
    '<div class="te-modal-field"><label>Проект</label>' +
      '<select id="te-project" onchange="teRefreshTasks()">' + projOpts + '</select></div>' +
    '<div class="te-modal-field"><label>Задача (по желанию)</label>' +
      '<select id="te-task"><option value="">— весь проект —</option></select></div>' +
    '<div class="te-modal-field"><label>Описание (по желанию)</label>' +
      '<textarea id="te-note" placeholder="Над чем работала">' +
      escapeHtml(opts.note || '') + '</textarea></div>';

  openCustomModal(titleMap[opts.mode] || 'Запись времени', bodyHtml, [
    { label: 'Отмена', kind: 'ghost', action: function () {
        closeModal();
        if (opts.onCancel) opts.onCancel();
      } },
    { label: opts.mode === 'edit' ? 'Сохранить' : 'Записать', kind: 'primary',
      action: function () { saveTimeEntry(opts); } }
  ]);

  // заполнить задачи выбранного проекта
  teRefreshTasks(opts.taskTid);
}

// обновляет список задач при выборе проекта
function teRefreshTasks(preselectTid) {
  const projSel = document.getElementById('te-project');
  const taskSel = document.getElementById('te-task');
  if (!projSel || !taskSel) return;
  const pnum = parseInt(projSel.value, 10);
  let opts = '<option value="">— весь проект —</option>';
  const p = state.projects.find(function (x) { return x.num === pnum; });
  if (p) {
    (p.tasks || []).forEach(function (t) {
      normalizeTask(t);
      opts += '<option value="' + t.tid + '"' +
        (preselectTid === t.tid ? ' selected' : '') + '>' +
        escapeHtml(t.name) + '</option>';
    });
  }
  taskSel.innerHTML = opts;
}

function saveTimeEntry(opts) {
  // длительность
  let minutes;
  if (opts.fixedDuration) {
    minutes = opts.minutes;
  } else {
    const hEl = document.getElementById('te-hours');
    const mEl = document.getElementById('te-mins');
    const hh = Math.max(0, parseInt(hEl ? hEl.value : '0', 10) || 0);
    const mm = Math.max(0, parseInt(mEl ? mEl.value : '0', 10) || 0);
    minutes = hh * 60 + mm;
  }
  if (!minutes || minutes < 1) {
    showErrorBar('Укажи длительность больше нуля.');
    return;
  }
  const dateEl = document.getElementById('te-date');
  const projEl = document.getElementById('te-project');
  const taskEl = document.getElementById('te-task');
  const noteEl = document.getElementById('te-note');

  const date = dateEl ? dateEl.value : todayISO();
  const projectNum = projEl && projEl.value ? parseInt(projEl.value, 10) : null;
  if (!projectNum) {
    showErrorBar('Выбери проект, к которому отнести время.');
    return;
  }
  const taskTid = taskEl && taskEl.value ? taskEl.value : '';
  let taskName = '';
  if (taskTid) {
    const found = findTaskByTid(taskTid);
    if (found) taskName = found.task.name;
  }
  const note = noteEl ? noteEl.value.trim() : '';

  if (opts.mode === 'edit' && opts.editId) {
    const rec = state.log.find(function (r) { return r.id === opts.editId; });
    if (rec) {
      rec.date = date; rec.minutes = minutes;
      rec.projectNum = projectNum; rec.taskTid = taskTid;
      rec.taskName = taskName; rec.note = note;
    }
  } else {
    state.log.push({
      id: genId(),
      date: date,
      minutes: minutes,
      projectNum: projectNum,
      taskTid: taskTid,
      taskName: taskName,
      note: note,
      createdAt: Date.now()
    });
  }

  closeModal();
  saveState(true);
  if (opts.onSaved) opts.onSaved();   // для stop — сброс таймера
  renderTimeLog();
}

// ===== ОБЗОР =====
let editMode = false;

function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('ov-mode-btn');
  const hint = document.getElementById('ov-hint');
  btn.classList.toggle('on', editMode);
  btn.textContent = editMode ? '✓ Готово' : '✎ Редактировать структуру';
  hint.textContent = editMode
    ? 'Переименовать, добавить, удалить, двигать стрелками ▲▼'
    : '';
  renderOverview();
}

function renderSphereFilter() {
  const box = document.getElementById('sphere-filter');
  let html = '<button class="sf-btn ' + (state.sphereFilter === 'all' ? 'active' : '') +
             '" onclick="setSphereFilter(\'all\')">Все сферы</button>';
  state.spheres.forEach(function (s) {
    html += '<button class="sf-btn ' + (state.sphereFilter === s.id ? 'active' : '') +
            '" onclick="setSphereFilter(\'' + s.id + '\')">' +
            '<span class="sf-dot" style="background:' + s.color + '"></span>' +
            escapeHtml(s.id + ' · ' + s.name) + '</button>';
  });
  box.innerHTML = html;
}
function setSphereFilter(id) {
  state.sphereFilter = id;
  saveState();
  renderSphereFilter();
  renderOverview();
}

function renderOverview() {
  const body = document.getElementById('overview-body');
  let html = '';
  state.spheres.forEach(function (s, si) {
    if (state.sphereFilter !== 'all' && state.sphereFilter !== s.id) return;
    const projs = state.projects.filter(function (p) { return p.sphere === s.id; });

    html += '<div class="sphere-block" data-sphere="' + s.id + '">';
    html += '<div class="sphere-head">';
    if (editMode) {
      const isFirst = si === 0;
      const isLast  = si === state.spheres.length - 1;
      html += '<span class="move-arrows">' +
        '<button class="move-btn" title="Выше" ' + (isFirst ? 'disabled' : '') +
          ' onclick="moveSphere(\'' + s.id + '\',-1)">▲</button>' +
        '<button class="move-btn" title="Ниже" ' + (isLast ? 'disabled' : '') +
          ' onclick="moveSphere(\'' + s.id + '\',1)">▼</button>' +
        '</span>';
    }
    html += '<div class="sphere-mark" style="background:' + s.color + '">' + s.id + '</div>' +
      '<h2>' + escapeHtml(s.name) + '</h2>';
    if (editMode) {
      html += '<div class="sphere-edit-actions">' +
        '<button class="edit-icon-btn" title="Переименовать сферу" ' +
          'onclick="editSphere(\'' + s.id + '\')">✎</button>' +
        '<button class="edit-icon-btn del" title="Удалить сферу" ' +
          'onclick="deleteSphere(\'' + s.id + '\')">✕</button>' +
        '</div>';
    } else {
      html += '<span class="s-count">' + projs.length + ' ' +
        plural(projs.length, 'проект', 'проекта', 'проектов') + '</span>';
    }
    html += '</div>';

    if (projs.length) {
      html += '<div class="tiles">';
      projs.forEach(function (p, pi) { html += renderTile(p, s, pi, projs.length); });
      html += '</div>';
    } else if (!editMode) {
      html += '<div class="ov-hint" style="padding:6px 2px;">В сфере пока нет проектов.</div>';
    }

    if (editMode) {
      html += '<div class="add-row">' +
        '<input type="text" id="add-proj-' + s.id + '" placeholder="Название нового проекта" ' +
        'onkeydown="if(event.key===\'Enter\')addProject(\'' + s.id + '\')">' +
        '<button onclick="addProject(\'' + s.id + '\')">+ Проект</button>' +
        '</div>';
    }
    html += '</div>';
  });

  if (!html) html = '<div class="stub">Нет сфер для показа.</div>';

  if (editMode && state.sphereFilter === 'all') {
    html += '<div class="add-sphere-row">' +
      '<div class="ar-title">Добавить новую сферу</div>' +
      '<div class="add-row">' +
      '<input type="text" id="add-sphere-name" placeholder="Название сферы" ' +
      'onkeydown="if(event.key===\'Enter\')addSphere()">' +
      '<button onclick="addSphere()">+ Сфера</button>' +
      '</div></div>';
  }
  body.innerHTML = html;
}

function renderTile(p, s, pi, pcount) {
  const st = projectStats(p);
  const dimmed = (p.status === 'paused') ? ' dimmed' : '';
  let badge = '';
  if (p.status === 'paused')  badge = '<span class="tile-badge bg-paused">на паузе</span>';
  if (p.status === 'backlog') badge = '<span class="tile-badge bg-backlog">backlog</span>';
  let stat;
  if (p.status === 'paused') {
    stat = 'свёрнут, задач нет';
  } else {
    stat = '<b>' + st.total + '</b> ' + plural(st.total, 'задача','задачи','задач');
    if (st.subs > 0) stat += ' · <b>' + st.subs + '</b> ' + plural(st.subs,'подзадача','подзадачи','подзадач');
  }
  const editing = editMode ? ' editing' : '';
  const clickAttr = editMode ? '' : ' onclick="openProject(' + p.num + ')"';

  let h = '<div class="tile' + dimmed + editing + '" data-pnum="' + p.num + '"' + clickAttr + '>';
  h += '<div class="tile-stripe" style="background:' + s.color + '"></div>';
  h += '<div class="tile-body">';
  h += '<div class="tile-name">';
  h += escapeHtml(p.short) + (p.isKey ? '<span class="tile-key">ключ</span>' : '') + '</div>';
  h += '<div class="tile-sub">сфера ' + s.id + ' · ' + escapeHtml(s.tag) + '</div>';
  h += '<div class="tile-stat">' + stat + ' ' + badge + '</div>';
  h += '</div>';
  if (editMode) {
    const isFirst = pi === 0;
    const isLast  = pi === pcount - 1;
    h += '<div class="tile-edit-bar">' +
      '<button class="edit-icon-btn" title="Выше" ' + (isFirst ? 'disabled' : '') +
        ' onclick="moveProject(' + p.num + ',-1)">▲</button>' +
      '<button class="edit-icon-btn" title="Ниже" ' + (isLast ? 'disabled' : '') +
        ' onclick="moveProject(' + p.num + ',1)">▼</button>' +
      '<span style="flex:1"></span>' +
      '<button class="edit-icon-btn" title="Редактировать проект" ' +
        'onclick="editProject(' + p.num + ')">✎</button>' +
      '<button class="edit-icon-btn del" title="Удалить проект" ' +
        'onclick="deleteProject(' + p.num + ')">✕</button>' +
      '</div>';
  }
  h += '</div>';
  return h;
}

// ----- редактирование сфер -----
function editSphere(id) {
  const s = sphereById(id);
  if (!s) return;
  openModal('Сфера: ' + escapeHtml(s.name), [
    { key: 'name', label: 'Название сферы', value: s.name },
    { key: 'tag',  label: 'Короткая подпись (для плиток)', value: s.tag },
    { key: 'color', label: 'Цвет (HEX, напр. #1d6b51)', value: s.color }
  ], function (vals) {
    s.name = vals.name.trim() || s.name;
    s.tag = vals.tag.trim() || s.tag;
    if (/^#[0-9a-fA-F]{6}$/.test(vals.color.trim())) s.color = vals.color.trim();
    saveState(true);
    renderAll();
  });
}
function addSphere() {
  const inp = document.getElementById('add-sphere-name');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  // новый id — следующая свободная буква
  const used = state.spheres.map(function (s) { return s.id; });
  let id = '';
  for (let c = 65; c <= 90; c++) {
    if (used.indexOf(String.fromCharCode(c)) === -1) { id = String.fromCharCode(c); break; }
  }
  if (!id) id = 'S' + state.spheres.length;
  state.spheres.push({ id: id, name: name, tag: name.toLowerCase().slice(0, 12), color: '#9a7b30' });
  inp.value = '';
  saveState(true);
  renderAll();
}
function deleteSphere(id) {
  const projs = state.projects.filter(function (p) { return p.sphere === id; });
  let msg = 'Удалить сферу?';
  if (projs.length) msg = 'В сфере ' + projs.length + ' ' +
    plural(projs.length,'проект','проекта','проектов') + '. Удалить сферу вместе со всеми проектами?';
  confirmModal(msg, function () {
    state.spheres = state.spheres.filter(function (s) { return s.id !== id; });
    state.projects = state.projects.filter(function (p) { return p.sphere !== id; });
    if (state.sphereFilter === id) state.sphereFilter = 'all';
    saveState(true);
    renderAll();
  });
}

// ----- редактирование проектов -----
function nextProjectNum() {
  let max = 0;
  state.projects.forEach(function (p) { if (p.num > max) max = p.num; });
  return max + 1;
}
function addProject(sphereId) {
  const inp = document.getElementById('add-proj-' + sphereId);
  const title = inp.value.trim();
  if (!title) { inp.focus(); return; }
  state.projects.push({
    sphere: sphereId, num: nextProjectNum(),
    title: title, short: title.slice(0, 22),
    goal: '', isKey: false, status: 'active', tasks: []
  });
  inp.value = '';
  saveState(true);
  renderOverview();
}
function editProject(num) {
  const p = state.projects.find(function (x) { return x.num === num; });
  if (!p) return;
  openModal('Проект: ' + escapeHtml(p.short), [
    { key: 'title', label: 'Полное название', value: p.title },
    { key: 'short', label: 'Короткое имя (для плитки)', value: p.short },
    { key: 'goal',  label: 'Цель проекта', value: p.goal, area: true },
    { key: 'status', label: 'Статус: active / backlog / paused', value: p.status },
    { key: 'isKey', label: 'Проект-ключ? (да / нет)', value: p.isKey ? 'да' : 'нет' }
  ], function (vals) {
    p.title = vals.title.trim() || p.title;
    p.short = vals.short.trim() || p.short;
    p.goal = vals.goal.trim();
    const st = vals.status.trim().toLowerCase();
    if (['active','backlog','paused'].indexOf(st) !== -1) p.status = st;
    p.isKey = /^(да|yes|y|1)$/i.test(vals.isKey.trim());
    saveState(true);
    renderOverview();
  });
}
function deleteProject(num) {
  const p = state.projects.find(function (x) { return x.num === num; });
  if (!p) return;
  confirmModal('Удалить проект «' + p.short + '» со всеми его задачами?', function () {
    state.projects = state.projects.filter(function (x) { return x.num !== num; });
    saveState(true);
    renderOverview();
  });
}

// ----- перемещение проектов стрелками -----
// направление dir: -1 вверх, +1 вниз. Двигаем только внутри своей сферы.
function moveProject(num, dir) {
  const p = state.projects.find(function (x){ return x.num === num; });
  if (!p) return;
  // индексы проектов этой же сферы в общем массиве
  const sameSphere = [];
  state.projects.forEach(function (x, i) {
    if (x.sphere === p.sphere) sameSphere.push(i);
  });
  const posInSphere = sameSphere.findIndex(function (i) {
    return state.projects[i].num === num;
  });
  const swapWith = posInSphere + dir;
  if (swapWith < 0 || swapWith >= sameSphere.length) return;
  const idxA = sameSphere[posInSphere];
  const idxB = sameSphere[swapWith];
  const tmp = state.projects[idxA];
  state.projects[idxA] = state.projects[idxB];
  state.projects[idxB] = tmp;
  saveState(true);
  renderOverview();
}

// ----- перемещение сфер стрелками -----
function moveSphere(id, dir) {
  const arr = state.spheres;
  const idx = arr.findIndex(function (s){ return s.id === id; });
  if (idx < 0) return;
  const swap = idx + dir;
  if (swap < 0 || swap >= arr.length) return;
  const tmp = arr[idx];
  arr[idx] = arr[swap];
  arr[swap] = tmp;
  saveState(true);
  renderAll();
}

// ----- модалка-редактор -----
let modalCallback = null;
function openModal(title, fields, onSave) {
  const box = document.getElementById('modal-box');
  let html = '<h3>' + title + '</h3>';
  fields.forEach(function (f) {
    html += '<label>' + escapeHtml(f.label) + '</label>';
    if (f.area) {
      html += '<textarea id="modal-f-' + f.key + '">' + escapeHtml(f.value || '') + '</textarea>';
    } else {
      html += '<input type="text" id="modal-f-' + f.key + '" value="' + escapeHtml(f.value || '') + '">';
    }
  });
  html += '<div class="modal-actions">' +
    '<button class="btn-cancel" onclick="closeModal()">Отмена</button>' +
    '<button class="btn-save" onclick="saveModal()">Сохранить</button>' +
    '</div>';
  box.innerHTML = html;
  box.dataset.fields = JSON.stringify(fields.map(function (f){ return f.key; }));
  modalCallback = onSave;
  document.getElementById('modal-bg').classList.add('open');
}
function saveModal() {
  const box = document.getElementById('modal-box');
  const keys = JSON.parse(box.dataset.fields || '[]');
  const vals = {};
  keys.forEach(function (k) {
    const el = document.getElementById('modal-f-' + k);
    vals[k] = el ? el.value : '';
  });
  const cb = modalCallback;   // сохраняем до закрытия — closeModal обнуляет modalCallback
  closeModal();
  if (cb) cb(vals);
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  modalCallback = null;
}

// собственное окно подтверждения (не зависит от настроек браузера)
let confirmCallback = null;
function confirmModal(message, onYes, opts) {
  opts = opts || {};
  const okLabel = opts.okLabel || 'Удалить';
  const okColor = opts.okColor || '#a33636';
  const title = opts.title || 'Подтверждение';
  const box = document.getElementById('modal-box');
  // поддержка переносов строк в сообщении
  const msgHtml = escapeHtml(message).replace(/\n/g, '<br>');
  box.innerHTML = '<h3>' + escapeHtml(title) + '</h3>' +
    '<p style="font-size:13.5px;color:var(--text-dim);line-height:1.55;">' + msgHtml + '</p>' +
    '<div class="modal-actions">' +
    '<button class="btn-cancel" onclick="closeConfirm()">Отмена</button>' +
    '<button class="btn-save" style="background:' + okColor + ';" onclick="acceptConfirm()">' +
      escapeHtml(okLabel) + '</button>' +
    '</div>';
  confirmCallback = onYes;
  document.getElementById('modal-bg').classList.add('open');
}
function acceptConfirm() {
  const cb = confirmCallback;
  closeConfirm();
  if (cb) cb();
}
function closeConfirm() {
  document.getElementById('modal-bg').classList.remove('open');
  confirmCallback = null;
}

// модалка с произвольным HTML и набором кнопок
// buttons: [{ label, kind:'primary'|'ghost', action: fn }]
let customModalActions = {};
function openCustomModal(title, bodyHtml, buttons) {
  const box = document.getElementById('modal-box');
  customModalActions = {};
  let btnHtml = '';
  (buttons || []).forEach(function (b, i) {
    customModalActions['b' + i] = b.action;
    const cls = b.kind === 'primary' ? 'btn-save' : 'btn-cancel';
    btnHtml += '<button class="' + cls + '" onclick="runCustomModalAction(' + i + ')">' +
      escapeHtml(b.label) + '</button>';
  });
  box.innerHTML = '<h3>' + escapeHtml(title) + '</h3>' +
    bodyHtml +
    '<div class="modal-actions">' + btnHtml + '</div>';
  document.getElementById('modal-bg').classList.add('open');
}
function runCustomModalAction(i) {
  const fn = customModalActions['b' + i];
  if (fn) fn();
}
