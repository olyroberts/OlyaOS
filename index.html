let currentProjectNum = null;   // открытый проект
let projEditMode = false;       // режим правки внутри проекта
let openSubsFor = {};           // какие задачи раскрыты {taskIdx:true}
let openDateFor = {};           // у каких задач открыт выбор даты {taskIdx:true}

const TASK_TYPES = [
  { id: 'rep',  label: 'Повторяющаяся', short: 'повтор.',  cls: 'rep'  },
  { id: 'once', label: 'Разовая',       short: 'разовая',  cls: 'once' },
  { id: 'cond', label: 'Условная',      short: 'условная', cls: 'cond' },
  { id: 'back', label: 'Backlog',       short: 'backlog',  cls: 'back' },
  { id: '',     label: 'Тип не выбран', short: 'без типа', cls: 'none' }
];
function taskTypeInfo(id) {
  return TASK_TYPES.find(function (t) { return t.id === (id || ''); }) || TASK_TYPES[4];
}

// Приоритеты задач
const PRIORITIES = [
  { id: 'crit', label: 'Критично',  short: 'критично', icon: '🔴', rank: 0 },
  { id: 'imp',  label: 'Важно',     short: 'важно',    icon: '🟡', rank: 1 },
  { id: 'norm', label: 'Обычное',   short: 'обычное',  icon: '⚪', rank: 2 }
];
function priorityInfo(id) {
  return PRIORITIES.find(function (p) { return p.id === id; }) || PRIORITIES[2];
}

function currentProject() {
  return state.projects.find(function (x) { return x.num === currentProjectNum; });
}

// ----- форматирование даты -----
const WD_SHORT = ['вс','пн','вт','ср','чт','пт','сб'];
const MON_SHORT = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function fmtDateHuman(iso) {
  // 'YYYY-MM-DD' -> 'чт, 5 июн'
  if (!iso) return '';
  const parts = iso.split('-');
  if (parts.length !== 3) return iso;
  const d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  if (isNaN(d.getTime())) return iso;
  return WD_SHORT[d.getDay()] + ', ' + d.getDate() + ' ' + MON_SHORT[d.getMonth()];
}
function dateRelLabel(iso) {
  // 'сегодня' / 'завтра' / 'просрочено' — для подсветки
  if (!iso) return '';
  const t = todayISO();
  if (iso === t) return 'сегодня';
  if (iso < t) return 'просрочено';
  // завтра?
  const d = new Date();
  d.setDate(d.getDate() + 1);
  const tm = d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
  if (iso === tm) return 'завтра';
  return '';
}

function openProject(num) {
  const p = state.projects.find(function (x) { return x.num === num; });
  if (!p) return;
  currentProjectNum = num;
  projEditMode = false;
  openSubsFor = {};
  openDateFor = {};
  // по умолчанию раскрываем задачи с незавершёнными подзадачами
  p.tasks.forEach(function (t, i) {
    normalizeTask(t);
    if (t.subs && t.subs.length && t.subs.some(function (s){ return !s.done; })) {
      openSubsFor[i] = true;
    }
  });
  renderProject();
  document.getElementById('proj-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('proj-overlay').scrollTop = 0;
}
function closeProject() {
  document.getElementById('proj-overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentProjectNum = null;
  projEditMode = false;
  renderOverview();   // обновим статистику на плитках
  renderWeek();       // изменения дат/приоритетов отразятся в Неделе
  renderDay();        // и в Дне
  renderCalendar();   // и в Календаре
}
function toggleProjEdit() {
  projEditMode = !projEditMode;
  const btn = document.getElementById('proj-edit-toggle');
  btn.classList.toggle('on', projEditMode);
  btn.textContent = projEditMode ? '✓ Готово' : '✎ Редактировать';
  if (!projEditMode) openDateFor = {};
  renderProject();
}

function renderProject() {
  const p = currentProject();
  const box = document.getElementById('proj-content');
  if (!p) { box.innerHTML = '<div class="tasks-empty">Проект не найден.</div>'; return; }
  const s = sphereById(p.sphere);
  const color = s ? s.color : '#9a7b30';
  const st = projectStats(p);

  // ----- шапка проекта -----
  let h = '<div class="proj-head">';
  h += '<div class="proj-head-stripe" style="background:' + color + '"></div>';
  h += '<div class="proj-head-body">';
  h += '<div class="proj-head-top">';
  if (s) h += '<span class="proj-sphere-tag" style="background:' + color + '">' +
    escapeHtml(s.id + ' · ' + s.name) + '</span>';
  if (p.isKey) h += '<span class="proj-key-tag">проект-ключ</span>';
  if (p.status === 'paused')
    h += '<span class="proj-status-tag bg-paused">на паузе</span>';
  if (p.status === 'backlog')
    h += '<span class="proj-status-tag bg-backlog">backlog</span>';
  h += '</div>';
  h += '<div class="proj-title">' + escapeHtml(p.title) + '</div>';
  h += '<div class="proj-goal-label">Цель проекта</div>';
  if (p.goal) {
    h += '<div class="proj-goal">' + escapeHtml(p.goal) + '</div>';
  } else {
    h += '<div class="proj-goal empty">Цель пока не задана.</div>';
  }
  if (st.subs > 0) {
    const pct = Math.round(st.subsDone / st.subs * 100);
    h += '<div class="proj-progress">' +
      '<span>Подзадачи: ' + st.subsDone + ' / ' + st.subs + '</span>' +
      '<span class="proj-progress-bar"><span class="proj-progress-fill" style="width:' +
        pct + '%;background:' + color + '"></span></span>' +
      '<span>' + pct + '%</span></div>';
  }
  if (projEditMode) {
    h += '<div class="proj-head-edit">' +
      '<button onclick="editProjectFromPage()">✎ Цель, название, статус</button>' +
      '</div>';
  }
  h += '</div></div>';

  // ----- секция задач -----
  h += '<div class="tasks-section-head">' +
    '<h3>Задачи</h3>' +
    '<span class="t-count">' + st.total + ' ' +
      plural(st.total,'задача','задачи','задач') +
      (st.typed < st.total ? ' · ' + (st.total - st.typed) + ' без типа' : '') +
    '</span></div>';
  h += '<div class="tasks-section-hint">' +
    (projEditMode
      ? 'Это склад задач. Задай задаче дату — она попадёт в план недели и дня. Повторяющиеся приходят в день сами. Тип, дату, порядок и подзадачи меняй здесь.'
      : 'Это склад задач проекта. Отмечать выполнение и планировать время — в табах «Неделя» и «День». Нажми «Редактировать», чтобы менять задачи.') +
    '</div>';

  if (!p.tasks.length) {
    h += '<div class="tasks-empty">В проекте пока нет задач.' +
      (projEditMode ? '' : ' Нажми «Редактировать», чтобы добавить.') + '</div>';
  } else {
    TASK_TYPES.forEach(function (tt) {
      const items = [];
      p.tasks.forEach(function (t, idx) {
        if ((t.type || '') === tt.id) items.push({ t: t, idx: idx });
      });
      if (!items.length) return;
      h += '<div class="task-group">';
      h += '<div class="task-group-label tg-' + tt.cls + '">' +
        '<span class="tg-dot"></span>' + escapeHtml(tt.label) +
        ' <span style="color:var(--text-faint);font-weight:400;">· ' + items.length + '</span></div>';
      items.forEach(function (it, gi) {
        h += renderTaskCard(p, it.t, it.idx, gi, items.length);
      });
      h += '</div>';
    });
  }

  // ----- добавление задачи -----
  if (projEditMode) {
    let typeOpts = '';
    TASK_TYPES.forEach(function (tt) {
      typeOpts += '<option value="' + tt.id + '">' + escapeHtml(tt.label) + '</option>';
    });
    h += '<div class="task-add-box">' +
      '<div class="tab-title">Новая задача</div>' +
      '<div class="add-row">' +
      '<input type="text" id="new-task-name" placeholder="Название задачи" ' +
        'onkeydown="if(event.key===\'Enter\')addTask()">' +
      '<select id="new-task-type">' + typeOpts + '</select>' +
      '<button onclick="addTask()">+ Задача</button>' +
      '</div></div>';
  }

  box.innerHTML = h;
}

function renderTaskCard(p, t, idx, gi, gcount) {
  normalizeTask(t);
  const subsTotal = t.subs.length;
  const subsDone  = t.subs.filter(function (s){ return s.done; }).length;
  const tt = taskTypeInfo(t.type);
  const subsOpen = !!openSubsFor[idx];
  const dateOpen = !!openDateFor[idx];

  let h = '<div class="task-card" data-tidx="' + idx + '">';
  h += '<div class="task-main">';
  h += '<div class="task-text-block">';
  h += '<div class="task-name">';
  const pri = priorityInfo(t.priority);
  if (t.priority && t.priority !== 'norm') {
    h += '<span class="task-pri" title="' + escapeHtml(pri.label) + '">' + pri.icon + '</span> ';
  }
  h += escapeHtml(t.name) + '</div>';
  if (t.hint) h += '<div class="task-hint">' + escapeHtml(t.hint) + '</div>';

  // строка с датой и подзадачами
  h += '<div class="task-meta-row">';
  // плашка даты / ритма
  if (t.type === 'rep') {
    h += '<span class="task-date rhythm" title="Повторяется — приходит в план дня сама">' +
      '↻ каждый день</span>';
  } else if (t.date) {
    const rel = dateRelLabel(t.date);
    let label = fmtDateHuman(t.date);
    if (t.time) label += ' · ' + t.time;
    let cls = 'task-date';
    let title = 'Запланировано';
    if (rel === 'просрочено') { title = 'Дата уже прошла'; }
    h += '<span class="' + cls + '" title="' + title + '">📅 ' + escapeHtml(label) +
      (rel && rel !== 'просрочено' ? ' · ' + rel : '') +
      (rel === 'просрочено' ? ' · просрочено' : '') + '</span>';
  } else if (t.type === 'once') {
    h += '<span class="task-date unplanned" title="Дата не задана — задача не в плане">' +
      'без даты</span>';
  }
  // подзадачи
  if (subsTotal > 0) {
    h += '<button class="subs-toggle' + (subsOpen ? ' open' : '') + '" ' +
      'onclick="toggleSubs(' + idx + ')">' +
      '<span class="subs-arrow">▶</span> Подзадачи ' +
      subsDone + '/' + subsTotal + '</button>';
  } else if (projEditMode) {
    h += '<button class="subs-toggle' + (subsOpen ? ' open' : '') + '" ' +
      'onclick="toggleSubs(' + idx + ')">' +
      '<span class="subs-arrow">▶</span> + добавить подзадачи</button>';
  }
  h += '</div>';
  h += '</div>';   // task-text-block
  h += '<span class="task-type-pill ttp-' + tt.cls + '">' + escapeHtml(tt.short) + '</span>';
  h += '</div>';   // task-main

  // ----- блок выбора даты (режим правки, кроме повторяющихся) -----
  if (projEditMode && dateOpen && t.type !== 'rep') {
    h += '<div class="task-date-edit">' +
      '<label>Дата</label>' +
      '<input type="date" value="' + escapeHtml(t.date || '') + '" ' +
        'onchange="setTaskDate(' + idx + ',this.value)">' +
      '<label>Время</label>' +
      '<input type="time" value="' + escapeHtml(t.time || '') + '" ' +
        'onchange="setTaskTime(' + idx + ',this.value)">';
    if (t.date || t.time) {
      h += '<button class="clear-date" onclick="clearTaskDate(' + idx + ')">Убрать дату</button>';
    }
    h += '</div>';
  }
  if (projEditMode && dateOpen && t.type === 'rep') {
    h += '<div class="task-date-edit">' +
      '<span class="rhythm-note">↻ Повторяющаяся задача приходит в план дня каждый день автоматически. Дату задавать не нужно.</span>' +
      '</div>';
  }

  // ----- блок подзадач -----
  if (subsOpen) {
    h += '<div class="subs-wrap">';
    if (subsTotal === 0) {
      h += '<div style="font-size:11.5px;color:var(--text-faint);padding:2px 0 4px;">Подзадачи — чек-лист шагов внутри задачи. Своей даты у них нет.</div>';
    }
    t.subs.forEach(function (sub, si) {
      h += '<div class="sub-row' + (sub.done ? ' s-done' : '') + '">';
      h += '<div class="sub-check' + (sub.done ? ' checked' : '') + '" ' +
        'onclick="toggleSub(' + idx + ',' + si + ')">' + (sub.done ? '✓' : '') + '</div>';
      h += '<div class="sub-name">' + escapeHtml(sub.name) + '</div>';
      if (projEditMode) {
        h += '<div class="sub-actions">' +
          '<button class="sub-mini-btn" title="Выше" ' + (si === 0 ? 'disabled' : '') +
            ' onclick="moveSub(' + idx + ',' + si + ',-1)">▲</button>' +
          '<button class="sub-mini-btn" title="Ниже" ' + (si === subsTotal - 1 ? 'disabled' : '') +
            ' onclick="moveSub(' + idx + ',' + si + ',1)">▼</button>' +
          '<button class="sub-mini-btn" title="Переименовать" ' +
            'onclick="editSub(' + idx + ',' + si + ')">✎</button>' +
          '<button class="sub-mini-btn del" title="Удалить" ' +
            'onclick="deleteSub(' + idx + ',' + si + ')">✕</button>' +
          '</div>';
      }
      h += '</div>';
    });
    h += '<div class="sub-add-row">' +
      '<input type="text" id="new-sub-' + idx + '" placeholder="Новая подзадача" ' +
        'onkeydown="if(event.key===\'Enter\')addSub(' + idx + ')">' +
      '<button onclick="addSub(' + idx + ')">+</button>' +
      '</div>';
    h += '</div>';
  }

  // ----- панель правки задачи -----
  if (projEditMode) {
    let typeOpts = '';
    TASK_TYPES.forEach(function (tt2) {
      typeOpts += '<option value="' + tt2.id + '"' +
        ((t.type || '') === tt2.id ? ' selected' : '') + '>' +
        escapeHtml(tt2.label) + '</option>';
    });
    let priOpts = '';
    PRIORITIES.forEach(function (pr) {
      priOpts += '<option value="' + pr.id + '"' +
        (t.priority === pr.id ? ' selected' : '') + '>' +
        pr.icon + ' ' + escapeHtml(pr.label) + '</option>';
    });
    h += '<div class="task-edit-bar">' +
      '<button class="edit-icon-btn" title="Выше" ' + (gi === 0 ? 'disabled' : '') +
        ' onclick="moveTask(' + idx + ',-1)">▲</button>' +
      '<button class="edit-icon-btn" title="Ниже" ' + (gi === gcount - 1 ? 'disabled' : '') +
        ' onclick="moveTask(' + idx + ',1)">▼</button>' +
      '<select title="Тип задачи" onchange="setTaskType(' + idx + ',this.value)">' +
        typeOpts + '</select>' +
      '<select title="Приоритет" onchange="setTaskPriority(' + idx + ',this.value)">' +
        priOpts + '</select>' +
      '<button class="edit-icon-btn' + (dateOpen ? ' on-date' : '') +
        '" title="Дата и время" onclick="toggleDateEdit(' + idx + ')">📅</button>' +
      '<span class="te-spacer"></span>' +
      '<button class="edit-icon-btn" title="Редактировать задачу" ' +
        'onclick="editTask(' + idx + ')">✎</button>' +
      '<button class="edit-icon-btn del" title="Удалить задачу" ' +
        'onclick="deleteTask(' + idx + ')">✕</button>' +
      '</div>';
  }

  h += '</div>';   // task-card
  return h;
}

// ----- цель / шапка проекта -----
function editProjectFromPage() {
  const p = currentProject();
  if (!p) return;
  openModal('Проект: ' + escapeHtml(p.short), [
    { key: 'title', label: 'Полное название', value: p.title },
    { key: 'short', label: 'Короткое имя (для плитки)', value: p.short },
    { key: 'goal',  label: 'Цель проекта', value: p.goal, area: true },
    { key: 'status', label: 'Статус: active / backlog / paused', value: p.status },
    { key: 'isKey', label: 'Проект-ключ? (да / нет)', value: p.isKey ? 'да' : 'нет' }
  ], function (vals) {
    p.title = vals.title.trim() || p.title;
    p.short = vals.short.trim() || p.short;
    p.goal = vals.goal.trim();
    const stt = vals.status.trim().toLowerCase();
    if (['active','backlog','paused'].indexOf(stt) !== -1) p.status = stt;
    p.isKey = /^(да|yes|y|1)$/i.test(vals.isKey.trim());
    saveState(true);
    renderProject();
  });
}

// ----- галочки подзадач -----
function toggleSub(tIdx, sIdx) {
  const p = currentProject();
  if (!p || !p.tasks[tIdx] || !p.tasks[tIdx].subs[sIdx]) return;
  const sub = p.tasks[tIdx].subs[sIdx];
  sub.done = !sub.done;
  saveState(true);
  renderProject();
}

// ----- раскрытие подзадач / выбора даты -----
function toggleSubs(idx) {
  openSubsFor[idx] = !openSubsFor[idx];
  renderProject();
}
function toggleDateEdit(idx) {
  openDateFor[idx] = !openDateFor[idx];
  renderProject();
}

// ----- тип задачи -----
function setTaskType(idx, type) {
  const p = currentProject();
  if (!p || !p.tasks[idx]) return;
  const t = p.tasks[idx];
  t.type = type || '';
  if (t.type === 'rep') {
    // повторяющаяся — конкретная дата не нужна, ставим ритм
    t.rhythm = 'daily';
    t.date = '';
    t.time = '';
  } else {
    t.rhythm = '';
  }
  saveState(true);
  renderProject();
}

// ----- приоритет задачи -----
function setTaskPriority(idx, val) {
  const p = currentProject();
  if (!p || !p.tasks[idx]) return;
  p.tasks[idx].priority = (['crit','imp','norm'].indexOf(val) !== -1) ? val : 'norm';
  saveState(true);
  renderProject();
}

// ----- дата и время задачи -----
function setTaskDate(idx, val) {
  const p = currentProject();
  if (!p || !p.tasks[idx]) return;
  p.tasks[idx].date = val || '';
  saveState(true);
  renderProject();
}
function setTaskTime(idx, val) {
  const p = currentProject();
  if (!p || !p.tasks[idx]) return;
  p.tasks[idx].time = val || '';
  saveState(true);
  renderProject();
}
function clearTaskDate(idx) {
  const p = currentProject();
  if (!p || !p.tasks[idx]) return;
  p.tasks[idx].date = '';
  p.tasks[idx].time = '';
  saveState(true);
  renderProject();
}

// ----- добавление / правка / удаление задач -----
function addTask() {
  const p = currentProject();
  if (!p) return;
  const inp = document.getElementById('new-task-name');
  const sel = document.getElementById('new-task-type');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  const type = sel ? sel.value : '';
  p.tasks.push({
    tid: genId(),
    name: name, type: type, hint: '',
    date: '', time: '',
    rhythm: type === 'rep' ? 'daily' : '',
    priority: 'norm',
    subs: []
  });
  inp.value = '';
  if (sel) sel.value = '';
  saveState(true);
  renderProject();
}
function editTask(idx) {
  const p = currentProject();
  if (!p || !p.tasks[idx]) return;
  const t = p.tasks[idx];
  openModal('Задача', [
    { key: 'name', label: 'Название задачи', value: t.name, area: true },
    { key: 'hint', label: 'Примечание / триггер (необязательно)', value: t.hint || '' }
  ], function (vals) {
    t.name = vals.name.trim() || t.name;
    t.hint = vals.hint.trim();
    saveState(true);
    renderProject();
  });
}
function deleteTask(idx) {
  const p = currentProject();
  if (!p || !p.tasks[idx]) return;
  const t = p.tasks[idx];
  confirmModal('Удалить задачу «' + t.name + '»' +
    (t.subs && t.subs.length ? ' со всеми подзадачами?' : '?'), function () {
    p.tasks.splice(idx, 1);
    openSubsFor = remapIdxMap(openSubsFor, idx);
    openDateFor = remapIdxMap(openDateFor, idx);
    saveState(true);
    renderProject();
  });
}
// сдвиг карт раскрытия при удалении задачи idx
function remapIdxMap(map, removedIdx) {
  const out = {};
  Object.keys(map).forEach(function (k) {
    const ki = parseInt(k, 10);
    if (ki < removedIdx) out[ki] = map[k];
    else if (ki > removedIdx) out[ki - 1] = map[k];
  });
  return out;
}

// ----- перемещение задач (внутри своей типовой группы) -----
function moveTask(idx, dir) {
  const p = currentProject();
  if (!p || !p.tasks[idx]) return;
  const type = p.tasks[idx].type || '';
  const sameType = [];
  p.tasks.forEach(function (t, i) {
    if ((t.type || '') === type) sameType.push(i);
  });
  const pos = sameType.indexOf(idx);
  const swapPos = pos + dir;
  if (swapPos < 0 || swapPos >= sameType.length) return;
  const idxA = sameType[pos];
  const idxB = sameType[swapPos];
  const tmp = p.tasks[idxA];
  p.tasks[idxA] = p.tasks[idxB];
  p.tasks[idxB] = tmp;
  swapIdxMaps(idxA, idxB);
  saveState(true);
  renderProject();
}
function swapIdxMaps(a, b) {
  [openSubsFor, openDateFor].forEach(function (map) {
    const va = map[a], vb = map[b];
    if (vb) map[a] = true; else delete map[a];
    if (va) map[b] = true; else delete map[b];
  });
}

// ----- подзадачи: добавление / правка / удаление / перемещение -----
function addSub(tIdx) {
  const p = currentProject();
  if (!p || !p.tasks[tIdx]) return;
  const inp = document.getElementById('new-sub-' + tIdx);
  if (!inp) return;
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  if (!p.tasks[tIdx].subs) p.tasks[tIdx].subs = [];
  p.tasks[tIdx].subs.push({ name: name, done: false });
  openSubsFor[tIdx] = true;
  saveState(true);
  renderProject();
}
function editSub(tIdx, sIdx) {
  const p = currentProject();
  if (!p || !p.tasks[tIdx] || !p.tasks[tIdx].subs[sIdx]) return;
  const sub = p.tasks[tIdx].subs[sIdx];
  openModal('Подзадача', [
    { key: 'name', label: 'Название подзадачи', value: sub.name, area: true }
  ], function (vals) {
    sub.name = vals.name.trim() || sub.name;
    saveState(true);
    renderProject();
  });
}
function deleteSub(tIdx, sIdx) {
  const p = currentProject();
  if (!p || !p.tasks[tIdx] || !p.tasks[tIdx].subs[sIdx]) return;
  const sub = p.tasks[tIdx].subs[sIdx];
  confirmModal('Удалить подзадачу «' + sub.name + '»?', function () {
    p.tasks[tIdx].subs.splice(sIdx, 1);
    saveState(true);
    renderProject();
  });
}
function moveSub(tIdx, sIdx, dir) {
  const p = currentProject();
  if (!p || !p.tasks[tIdx] || !p.tasks[tIdx].subs) return;
  const subs = p.tasks[tIdx].subs;
  const swap = sIdx + dir;
  if (swap < 0 || swap >= subs.length) return;
  const tmp = subs[sIdx];
  subs[sIdx] = subs[swap];
  subs[swap] = tmp;
  saveState(true);
  renderProject();
}

// ===== ЭКСПОРТ / ИМПОРТ / СБРОС =====
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'moya-sistema-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.onchange = function () {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function () {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed.projects || !parsed.spheres) throw new Error('Не тот формат');
        state = parsed;
        if (!state.log) state.log = [];
        if (!state.timer) state.timer = { running: false, startedAt: null, accumMs: 0 };
        saveState(true);
        renderAll();
        alert('Данные загружены.');
      } catch (e) {
        alert('Не удалось прочитать файл: ' + e.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}
function resetData() {
  if (!confirm('Сбросить все данные к исходному состоянию? Это удалит все твои изменения.')) return;
  state = defaultState();
  saveState(true);
  renderAll();
}




// ===== ТАБ «ВРЕМЯ» (лог учёта) =====
let timeMode = 'month';   // 'week' | 'month'
let timeOffset = 0;       // смещение периода

function timeSetMode(mode) {
  timeMode = mode;
  timeOffset = 0;
  renderTimeLog();
}
function timeShift(dir) { timeOffset += dir; renderTimeLog(); }
function timeToday() { timeOffset = 0; renderTimeLog(); }

// границы текущего периода: { from, to } в ISO (включительно)
function timePeriodRange() {
  if (timeMode === 'week') {
    const dates = weekDates(timeOffset);   // переиспользуем расчёт недели
    return { from: dates[0], to: dates[6] };
  }
  // месяц
  const ms = calMonthStart(timeOffset);
  const y = ms.getFullYear(), m = ms.getMonth();
  const last = new Date(y, m + 1, 0).getDate();
  return {
    from: y + '-' + String(m + 1).padStart(2, '0') + '-01',
    to:   y + '-' + String(m + 1).padStart(2, '0') + '-' + String(last).padStart(2, '0')
  };
}

// форматирование длительности из минут
function fmtDuration(min) {
  const h = Math.floor(min / 60), m = min % 60;
  if (h > 0 && m > 0) return h + ' ч ' + m + ' мин';
  if (h > 0) return h + ' ч';
  return m + ' мин';
}

function renderTimeLog() {
  // переключатель режима
  const wb = document.getElementById('tm-week');
  const mb = document.getElementById('tm-month');
  if (wb) wb.classList.toggle('on', timeMode === 'week');
  if (mb) mb.classList.toggle('on', timeMode === 'month');

  const range = timePeriodRange();

  // подпись периода
  const rangeEl = document.getElementById('time-range');
  const subEl = document.getElementById('time-sub');
  const MON_FULL = ['января','февраля','марта','апреля','мая','июня','июля',
                     'августа','сентября','октября','ноября','декабря'];
  const MON_NOM = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль',
                    'Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  let periodSub;
  if (timeMode === 'week') {
    const fp = range.from.split('-'), tp = range.to.split('-');
    const fd = new Date(+fp[0], +fp[1]-1, +fp[2]);
    const td = new Date(+tp[0], +tp[1]-1, +tp[2]);
    if (fd.getMonth() === td.getMonth()) {
      rangeEl.textContent = fd.getDate() + '–' + td.getDate() + ' ' + MON_FULL[fd.getMonth()];
    } else {
      rangeEl.textContent = fd.getDate() + ' ' + MON_SHORT[fd.getMonth()] + ' – ' +
        td.getDate() + ' ' + MON_SHORT[td.getMonth()];
    }
    periodSub = timeOffset === 0 ? 'эта неделя'
      : timeOffset === -1 ? 'прошлая неделя'
      : timeOffset === 1 ? 'следующая неделя'
      : timeOffset < 0 ? Math.abs(timeOffset) + ' нед. назад'
      : 'через ' + timeOffset + ' нед.';
  } else {
    const ms = calMonthStart(timeOffset);
    rangeEl.textContent = MON_NOM[ms.getMonth()] + ' ' + ms.getFullYear();
    periodSub = timeOffset === 0 ? 'текущий месяц'
      : timeOffset === -1 ? 'прошлый месяц'
      : timeOffset === 1 ? 'следующий месяц'
      : timeOffset < 0 ? Math.abs(timeOffset) + ' мес. назад'
      : 'через ' + timeOffset + ' мес.';
  }
  document.getElementById('time-today-btn').classList.toggle('hidden', timeOffset === 0);

  // записи периода
  const entries = state.log.filter(function (r) {
    return r.date >= range.from && r.date <= range.to;
  });
  entries.sort(function (a, b) {
    if (a.date !== b.date) return a.date > b.date ? -1 : 1;   // свежие сверху
    return (b.createdAt || 0) - (a.createdAt || 0);
  });

  // общий итог периода
  let totalMin = 0;
  entries.forEach(function (r) { totalMin += r.minutes; });

  // подпись периода: «текущий месяц · всего 2 ч 15 мин»
  if (entries.length) {
    subEl.innerHTML = escapeHtml(periodSub) +
      ' · <span class="tn-total">всего ' + fmtDuration(totalMin) + '</span>';
  } else {
    subEl.textContent = periodSub;
  }

  const body = document.getElementById('time-body');

  if (!entries.length) {
    body.innerHTML = '<div class="time-empty"><div class="big">⏱️</div>' +
      'За этот период записей нет.<br>' +
      'Останови таймер или нажми «+ Ввести время вручную», чтобы добавить запись.</div>';
    return;
  }

  // ----- агрегация по сферам и проектам -----
  const bySphere = {};   // sphereId -> { min, projects: {projNum: min} }
  entries.forEach(function (r) {
    const p = state.projects.find(function (x) { return x.num === r.projectNum; });
    const sid = p ? p.sphere : '?';
    if (!bySphere[sid]) bySphere[sid] = { min: 0, projects: {} };
    bySphere[sid].min += r.minutes;
    const pk = r.projectNum || 0;
    bySphere[sid].projects[pk] = (bySphere[sid].projects[pk] || 0) + r.minutes;
  });

  let h = '';

  // ----- сводка по сферам -----
  h += '<div class="time-section-title">По сферам и проектам</div>';
  // сферы по убыванию времени
  const sphereIds = Object.keys(bySphere).sort(function (a, b) {
    return bySphere[b].min - bySphere[a].min;
  });
  sphereIds.forEach(function (sid) {
    const s = sphereById(sid);
    const color = s ? s.color : '#9a7b30';
    const data = bySphere[sid];
    const pct = totalMin ? Math.round(data.min / totalMin * 100) : 0;
    h += '<div class="time-bar-row">';
    h += '<div class="time-bar-head">' +
      '<span class="tbh-name">' + escapeHtml(s ? (s.id + ' · ' + s.name) : 'Без сферы') + '</span>' +
      '<span class="tbh-val">' + fmtDuration(data.min) + '</span>' +
      '<span class="tbh-pct">' + pct + '%</span></div>';
    h += '<div class="time-bar-track"><div class="time-bar-fill" style="width:' +
      pct + '%;background:' + color + '"></div></div>';
    // проекты внутри сферы
    const projNums = Object.keys(data.projects).sort(function (a, b) {
      return data.projects[b] - data.projects[a];
    });
    if (projNums.length) {
      h += '<div class="time-proj-sub">';
      projNums.forEach(function (pn) {
        const p = state.projects.find(function (x) { return x.num === parseInt(pn,10); });
        h += '<div class="tps-row">' +
          '<span class="tps-name">' + escapeHtml(p ? p.short : 'Проект удалён') + '</span>' +
          '<span class="tps-val">' + fmtDuration(data.projects[pn]) + '</span></div>';
      });
      h += '</div>';
    }
    h += '</div>';
  });

  // ----- список записей по дням -----
  h += '<div class="time-section-title">Записи</div>';
  // группировка по дате
  const byDate = {};
  entries.forEach(function (r) {
    if (!byDate[r.date]) byDate[r.date] = [];
    byDate[r.date].push(r);
  });
  const dateKeys = Object.keys(byDate).sort(function (a, b) {
    return a > b ? -1 : 1;   // свежие сверху
  });
  const WD_SH = ['вс','пн','вт','ср','чт','пт','сб'];
  dateKeys.forEach(function (dk) {
    const dp = dk.split('-');
    const dObj = new Date(+dp[0], +dp[1]-1, +dp[2]);
    let daySum = 0;
    byDate[dk].forEach(function (r) { daySum += r.minutes; });
    h += '<div class="time-day-group">';
    h += '<div class="time-day-label">' +
      '<span>' + capitalize(WD_SH[dObj.getDay()]) + ', ' +
        dObj.getDate() + ' ' + MON_FULL[dObj.getMonth()] + '</span>' +
      '<span class="tdl-sum">' + fmtDuration(daySum) + '</span></div>';
    byDate[dk].forEach(function (r) {
      h += renderTimeEntry(r);
    });
    h += '</div>';
  });

  body.innerHTML = h;
}

// ===== ТАБ «КАЛЕНДАРЬ» =====
let calOffset = 0;        // 0 = текущий месяц, -1 прошлый, +1 следующий
let calSelectedDay = '';  // выбранный день (ISO) — раскрыт список под сеткой

function calShift(dir) { calOffset += dir; calSelectedDay = ''; renderCalendar(); }
function calToday() { calOffset = 0; calSelectedDay = ''; renderCalendar(); }

// первый день показываемого месяца как Date
function calMonthStart(offset) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(1);
  d.setMonth(d.getMonth() + offset);
  return d;
}

// собрать карту: { 'YYYY-MM-DD': [ {task, project, done} ] }
// только неповторяющиеся задачи с датой + выполненные дела из лога
function collectMonthItems(year, month) {
  const map = {};
  function push(dateISO, entry) {
    if (!map[dateISO]) map[dateISO] = [];
    map[dateISO].push(entry);
  }
  const seen = {};   // dateISO::tid

  // задачи из проектов (неповторяющиеся, с датой)
  state.projects.forEach(function (p) {
    if (p.status === 'paused') return;
    (p.tasks || []).forEach(function (t) {
      normalizeTask(t);
      if (t.type === 'rep') return;       // повторяющиеся в календаре не показываем
      if (!t.date) return;
      const parts = t.date.split('-');
      if (parts.length !== 3) return;
      if (+parts[0] !== year || +parts[1] !== month + 1) return;
      const rec = findDayLog(t.date, t.tid);
      push(t.date, { task: t, project: p, done: !!rec });
      seen[t.date + '::' + t.tid] = true;
    });
  });

  // выполненные дела из лога, которых уже нет среди задач (разовые удалённые)
  state.dayLog.forEach(function (r) {
    if (seen[r.date + '::' + r.tid]) return;
    if (r.wasRep) return;               // повторяющиеся не показываем
    const parts = r.date.split('-');
    if (parts.length !== 3) return;
    if (+parts[0] !== year || +parts[1] !== month + 1) return;
    const p = state.projects.find(function (x) { return x.num === r.projectNum; });
    push(r.date, { task: r.snapshot, project: p || null, done: true });
  });

  return map;
}

function renderCalendar() {
  const monthStart = calMonthStart(calOffset);
  const year = monthStart.getFullYear();
  const month = monthStart.getMonth();   // 0-11
  const todayI = todayISO();

  const MON_FULL = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль',
                     'Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  document.getElementById('cal-month').textContent = MON_FULL[month] + ' ' + year;
  let sub = '';
  if (calOffset === 0) sub = 'текущий месяц';
  else if (calOffset === -1) sub = 'прошлый месяц';
  else if (calOffset === 1) sub = 'следующий месяц';
  else if (calOffset < 0) sub = Math.abs(calOffset) + ' мес. назад';
  else sub = 'через ' + calOffset + ' мес.';
  document.getElementById('cal-sub').textContent = sub;
  document.getElementById('cal-today-btn').classList.toggle('hidden', calOffset === 0);

  // данные месяца
  const map = collectMonthItems(year, month);

  // сводка
  let totalTasks = 0, totalCrit = 0, daysWith = 0;
  Object.keys(map).forEach(function (k) {
    daysWith++;
    map[k].forEach(function (e) {
      totalTasks++;
      if (!e.done && e.task.priority === 'crit') totalCrit++;
    });
  });
  const summary = document.getElementById('cal-summary');
  if (totalTasks) {
    let s = '<span><b>' + totalTasks + '</b> ' +
      plural(totalTasks,'задача','задачи','задач') + ' в месяце</span>';
    s += '<span>в <b>' + daysWith + '</b> ' +
      plural(daysWith,'день','дня','дней') + '</span>';
    if (totalCrit) {
      s += '<span style="color:#a33636;">🔴 <b>' + totalCrit + '</b> ' +
        plural(totalCrit,'критичная','критичных','критичных') + '</span>';
    }
    summary.innerHTML = s;
  } else {
    summary.innerHTML = '<span>В этом месяце задач с датой нет.</span>';
  }

  // сетка
  // первый день месяца, день недели (пн=0..вс=6)
  const firstDow = (monthStart.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  // сколько дней предыдущего месяца показать в первой строке
  const prevMonthDays = new Date(year, month, 0).getDate();

  const WD = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  let g = '<div class="cal-grid"><div class="cal-weekdays">';
  WD.forEach(function (w, i) {
    g += '<div' + (i >= 5 ? ' class="cw-end"' : '') + '>' + w + '</div>';
  });
  g += '</div><div class="cal-cells">';

  // всего ячеек — кратно 7, чтобы сетка была ровной
  const totalCells = Math.ceil((firstDow + daysInMonth) / 7) * 7;
  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - firstDow + 1;
    if (dayNum < 1 || dayNum > daysInMonth) {
      // ячейка соседнего месяца — пустая, неактивная
      g += '<div class="cal-cell cc-blank"></div>';
      continue;
    }
    const cellISO = year + '-' +
      String(month + 1).padStart(2, '0') + '-' +
      String(dayNum).padStart(2, '0');
    const items = map[cellISO] || [];
    let cls = 'cal-cell';
    if (cellISO === todayI) cls += ' cc-today';
    if (cellISO === calSelectedDay) cls += ' cc-selected';

    g += '<div class="' + cls + '" onclick="calSelectDay(\'' + cellISO + '\')">';
    g += '<div class="cal-daynum">' + dayNum + '</div>';

    if (items.length) {
      // точки: считаем по приоритету (невыполненные) + выполненные
      let nCrit = 0, nImp = 0, nNorm = 0, nDone = 0, hasCrit = false;
      items.forEach(function (e) {
        if (e.done) { nDone++; return; }
        const pr = e.task.priority || 'norm';
        if (pr === 'crit') { nCrit++; hasCrit = true; }
        else if (pr === 'imp') nImp++;
        else nNorm++;
      });
      g += '<div class="cal-dots">';
      // показываем максимум ~6 точек, в порядке важности
      let shown = 0;
      function dots(n, c) {
        for (let k = 0; k < n && shown < 6; k++) {
          g += '<span class="cal-dot ' + c + '"></span>';
          shown++;
        }
      }
      dots(nCrit, 'cd-crit');
      dots(nImp, 'cd-imp');
      dots(nNorm, 'cd-norm');
      dots(nDone, 'cd-done');
      g += '</div>';
      g += '<div class="cal-count' + (hasCrit ? ' has-crit' : '') + '">' +
        items.length + ' ' + plural(items.length,'дело','дела','дел') + '</div>';
    }
    g += '</div>';
  }
  g += '</div></div>';
  document.getElementById('cal-grid-wrap').innerHTML = g;

  // подсказка
  if (totalTasks) {
    document.getElementById('cal-grid-wrap').innerHTML +=
      '<div class="cal-hint">Нажми на день, чтобы увидеть список дел.</div>';
  }

  // раскрытый день
  renderCalDayPanel();
}

function calSelectDay(dateISO) {
  // повторный клик по тому же дню — свернуть
  calSelectedDay = (calSelectedDay === dateISO) ? '' : dateISO;
  renderCalendar();
}

function renderCalDayPanel() {
  const wrap = document.getElementById('cal-day-panel-wrap');
  if (!calSelectedDay) { wrap.innerHTML = ''; return; }

  // дела выбранного дня (неповторяющиеся + выполненные из лога)
  const parts = calSelectedDay.split('-');
  const map = collectMonthItems(+parts[0], +parts[1] - 1);
  const items = (map[calSelectedDay] || []).slice();

  // сортировка: невыполненные сверху по приоритету, выполненные вниз
  items.sort(function (a, b) {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const ra = priorityInfo(a.task.priority).rank;
    const rb = priorityInfo(b.task.priority).rank;
    if (ra !== rb) return ra - rb;
    return (a.task.time || '99:99') < (b.task.time || '99:99') ? -1 : 1;
  });

  const dObj = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  const WD_FULL = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const MON_FULL = ['января','февраля','марта','апреля','мая','июня','июля',
                     'августа','сентября','октября','ноября','декабря'];
  const rel = dateRelLabel(calSelectedDay);

  let h = '<div class="cal-day-panel">';
  h += '<div class="cal-day-panel-head">';
  h += '<h3>' + capitalize(WD_FULL[dObj.getDay()]) + ', ' +
    dObj.getDate() + ' ' + MON_FULL[dObj.getMonth()] + '</h3>';
  if (rel) h += '<span class="cdp-count">' + rel + '</span>';
  h += '<span class="cdp-count">· ' + items.length + ' ' +
    plural(items.length,'дело','дела','дел') + '</span>';
  h += '</div>';
  h += '<div class="cal-day-panel-body">';

  if (!items.length) {
    h += '<div class="cal-day-empty">На этот день задач с датой нет.</div>';
  } else {
    items.forEach(function (e) {
      const t = e.task;
      const p = e.project;
      const s = p ? sphereById(p.sphere) : null;
      const color = s ? s.color : '#9a7b30';
      const pri = priorityInfo(t.priority);
      h += '<div class="cal-day-item' + (e.done ? ' cdi-done' : '') + '">';

        escapeHtml(p.short) + '</span>';

      h += '</div>';

}


// ===== ТАБ «ДЕНЬ» =====
let dayOffset = 0;   // 0 = сегодня, -1 вчера, +1 завтра

function dayShift(dir) { dayOffset += dir; renderDay(); }
function dayToday() { dayOffset = 0; renderDay(); }

// ISO-дата выбранного дня
function dayISO() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + dayOffset);
  return dateToISO(d);
}

// ключ записи лога: дата + tid задачи
function dayLogKey(dateISO, tid) { return dateISO + '::' + tid; }
function findDayLog(dateISO, tid) {
  return state.dayLog.find(function (r) {
    return r.date === dateISO && r.tid === tid;
  });
}

// собрать дела выбранного дня
// возвращает массив { task, project, fromLog, logRec }
function collectDayItems(dateISO) {
  const items = [];
  const seen = {};   // tid -> true (чтобы не задвоить)

  // 1) задачи из проектов: повторяющиеся + неповторяющиеся с датой = этот день
  state.projects.forEach(function (p) {
    if (p.status === 'paused') return;
    (p.tasks || []).forEach(function (t) {
      normalizeTask(t);
      let inDay = false;
      if (t.type === 'rep') inDay = true;
      else if (t.date && t.date === dateISO) inDay = true;
      if (!inDay) return;
      const rec = findDayLog(dateISO, t.tid);
      items.push({ task: t, project: p, fromLog: false, logRec: rec || null });
      seen[t.tid] = true;
    });
  });

  // 2) выполненные дела из лога, которых уже нет среди задач
  //    (разовые задачи после выполнения удаляются из проектов — берём их из лога)
  state.dayLog.forEach(function (r) {
    if (r.date !== dateISO) return;
    if (seen[r.tid]) return;
    const p = state.projects.find(function (x) { return x.num === r.projectNum; });
    items.push({ task: r.snapshot, project: p || null, fromLog: true, logRec: r });
    seen[r.tid] = true;
  });

  return items;
}

// ----- ручной порядок задач в дне -----
// dayPlan[dateISO].order — массив tid в порядке, заданном пользователем
function dayOrderList(dateISO) {
  const dp = state.dayPlan[dateISO];
  return (dp && Array.isArray(dp.order)) ? dp.order : [];
}
function setDayOrderList(dateISO, order) {
  if (!state.dayPlan[dateISO]) state.dayPlan[dateISO] = {};
  state.dayPlan[dateISO].order = order;
}
// ранг задачи в ручном порядке; нет в списке — в конец
function dayOrderRank(dateISO, tid) {
  const i = dayOrderList(dateISO).indexOf(tid);
  return i === -1 ? 100000 : i;
}

// сортировка группы дня: ручной порядок -> время -> имя
function sortDayGroup(group, dateISO) {
  group.sort(function (a, b) {
    const ra = dayOrderRank(dateISO, a.task.tid);
    const rb = dayOrderRank(dateISO, b.task.tid);
    if (ra !== rb) return ra - rb;
    const ta = a.task.time || '99:99', tb = b.task.time || '99:99';
    if (ta !== tb) return ta < tb ? -1 : 1;
    return a.task.name < b.task.name ? -1 : 1;
  });
}

// перемещение задачи стрелками внутри её приоритетной группы
function moveDayTask(dateISO, tid, dir) {
  // собрать актуальный список дел дня
  const items = collectDayItems(dateISO);
  const open = items.filter(function (it) { return !it.logRec; });
  const me = open.find(function (it) { return it.task.tid === tid; });
  if (!me) return;
  const myPri = me.task.priority || 'norm';
  // задачи той же приоритетной группы, в текущем порядке
  const groupItems = open.filter(function (it) {
    return (it.task.priority || 'norm') === myPri;
  });
  sortDayGroup(groupItems, dateISO);

  const pos = groupItems.findIndex(function (it) { return it.task.tid === tid; });
  const swap = pos + dir;
  if (pos === -1 || swap < 0 || swap >= groupItems.length) return;

  // строим новый order: берём текущий ручной порядок дня,
  // обеспечиваем что все задачи группы там есть, затем меняем местами
  let order = dayOrderList(dateISO).slice();
  // дописываем недостающие задачи группы в конец (в текущем порядке)
  groupItems.forEach(function (it) {
    if (order.indexOf(it.task.tid) === -1) order.push(it.task.tid);
  });
  // индексы двух меняемых задач в order
  const tidA = groupItems[pos].task.tid;
  const tidB = groupItems[swap].task.tid;
  const iA = order.indexOf(tidA);
  const iB = order.indexOf(tidB);
  if (iA === -1 || iB === -1) return;
  const tmp = order[iA]; order[iA] = order[iB]; order[iB] = tmp;

  setDayOrderList(dateISO, order);
  saveState(true);
  renderDay();
}


function renderDay() {
  const dISO = dayISO();
  const todayI = todayISO();

  // ---- подпись даты ----
  const parts = dISO.split('-');
  const dObj = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  const WD_FULL = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const MON_FULL = ['января','февраля','марта','апреля','мая','июня','июля',
                     'августа','сентября','октября','ноября','декабря'];
  document.getElementById('day-date').textContent =
    capitalize(WD_FULL[dObj.getDay()]) + ', ' + dObj.getDate() + ' ' + MON_FULL[dObj.getMonth()];
  const subEl = document.getElementById('day-sub');
  let sub = '', isToday = false;
  if (dayOffset === 0) { sub = 'сегодня'; isToday = true; }
  else if (dayOffset === -1) sub = 'вчера';
  else if (dayOffset === 1) sub = 'завтра';
  else if (dayOffset < 0) sub = Math.abs(dayOffset) + ' дн. назад';
  else sub = 'через ' + dayOffset + ' дн.';
  subEl.textContent = sub;
  subEl.classList.toggle('is-today', isToday);
  document.getElementById('day-today-btn').classList.toggle('hidden', dayOffset === 0);

  // ---- собираем дела ----
  const items = collectDayItems(dISO);

  // выполнено / осталось
  const doneItems = items.filter(function (it) { return !!it.logRec; });
  const openItems = items.filter(function (it) { return !it.logRec; });

  // ---- сводка ----
  const summary = document.getElementById('day-summary');
  if (items.length) {
    let s = '<span><b>' + openItems.length + '</b> ' +
      plural(openItems.length,'дело осталось','дела осталось','дел осталось') + '</span>';
    if (doneItems.length) {
      s += '<span class="ds-done">✓ <b>' + doneItems.length + '</b> ' +
        plural(doneItems.length,'выполнено','выполнено','выполнено') + '</span>';
    }
    const critOpen = openItems.filter(function (it) {
      return it.task.priority === 'crit';
    }).length;
    if (critOpen) {
      s += '<span style="color:#a33636;">🔴 <b>' + critOpen + '</b> ' +
        plural(critOpen,'критичное','критичных','критичных') + '</span>';
    }
    summary.innerHTML = s;
  } else {
    summary.innerHTML = '';
  }

  // ---- тело ----
  const body = document.getElementById('day-body');
  if (!items.length) {
    body.innerHTML = '<div class="day-empty"><div class="big">' +
      (dayOffset < 0 ? '🌙' : '☀️') + '</div>' +
      'На этот день дел нет.<br>' +
      'Поставь задаче дату на странице проекта — она появится здесь.</div>';
    return;
  }

  let h = '';

  // всё выполнено — поощряем
  if (openItems.length === 0 && doneItems.length > 0) {
    h += '<div class="day-alldone"><div class="big">🌿</div>' +
      'Все дела на ' + (dayOffset === 0 ? 'сегодня' : 'этот день') +
      ' закрыты. Хорошая работа.</div>';
  }

  // группы по приоритету (среди невыполненных)
  const groups = [
    { id: 'crit', label: '🔴 Критично — сначала это', cls: 'dg-crit' },
    { id: 'imp',  label: '🟡 Важно',                  cls: 'dg-imp'  },
    { id: 'norm', label: '⚪ Обычное',                 cls: 'dg-norm' }
  ];
  groups.forEach(function (g) {
    const inGroup = openItems.filter(function (it) {
      return (it.task.priority || 'norm') === g.id;
    });
    if (!inGroup.length) return;
    // порядок: сначала ручной (dayPlan), внутри одного ранга — по времени, затем имя
    sortDayGroup(inGroup, dISO);
    h += '<div class="day-group">';
    h += '<div class="day-group-label ' + g.cls + '">' + g.label +
      ' <span style="color:var(--text-faint);font-weight:400;">· ' + inGroup.length + '</span></div>';
    inGroup.forEach(function (it, gi) {
      h += renderDayTask(it, dISO, gi, inGroup.length);
    });
    h += '</div>';
  });

  // выполненные — отдельной группой внизу
  if (doneItems.length) {
    doneItems.sort(function (a, b) {
      return (b.logRec.doneAt || 0) - (a.logRec.doneAt || 0);
    });
    h += '<div class="day-group">';
    h += '<div class="day-group-label dg-done">✓ Выполнено' +
      ' <span style="color:var(--text-faint);font-weight:400;">· ' + doneItems.length + '</span></div>';
    doneItems.forEach(function (it) { h += renderDayTask(it, dISO, -1, 0); });
    h += '</div>';
  }

  body.innerHTML = h;
}

// короткое время из timestamp
function fmtTimeShort(ts) {
  const d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':' +
         String(d.getMinutes()).padStart(2,'0');
}
function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
}

// найти задачу по tid во всех проектах
function findTaskByTid(tid) {
  for (let i = 0; i < state.projects.length; i++) {
    const p = state.projects[i];
    const idx = (p.tasks || []).findIndex(function (t) { return t.tid === tid; });
    if (idx !== -1) return { project: p, task: p.tasks[idx], idx: idx };
  }
  return null;
}

// ----- отметка выполнения -----
function toggleDayTask(dISO, tid) {
  const existing = findDayLog(dISO, tid);
  if (existing) {
    // снять отметку
    uncompleteDayTask(dISO, tid);
    return;
  }
  // отметить — с подтверждением
  const found = findTaskByTid(tid);
  if (!found) return;
  const t = found.task;
  const isRep = t.type === 'rep';
  let msg;
  if (isRep) {
    msg = 'Отметить «' + t.name + '» выполненной за этот день?\n\n' +
      'Задача повторяющаяся — завтра появится снова.';
  } else {
    msg = 'Отметить «' + t.name + '» выполненной?\n\n' +
      'Дело уйдёт из списка проекта. ' +
      'Если передумаешь — нажми «Вернуть в дела», задача восстановится.';
  }
  confirmModal(msg, function () {
    completeDayTask(dISO, tid);
  }, { title: 'Выполнено?', okLabel: 'Да, выполнено', okColor: '#1d6b51' });
}

function completeDayTask(dISO, tid) {
  const found = findTaskByTid(tid);
  if (!found) return;
  const t = found.task;
  const p = found.project;
  const isRep = t.type === 'rep';

  // запись в лог со снимком задачи (снимок нужен, чтобы показать дело
  // и чтобы восстановить разовую задачу при отмене)
  state.dayLog.push({
    date: dISO,
    tid: tid,
    projectNum: p.num,
    doneAt: Date.now(),
    wasRep: isRep,
    snapshot: JSON.parse(JSON.stringify(t))
  });

  // разовая (любая неповторяющаяся) — уходит из проекта
  if (!isRep) {
    p.tasks.splice(found.idx, 1);
  }

  saveState(true);
  renderDay();
  renderCalendar();
}

function uncompleteDayTask(dISO, tid) {
  const idx = state.dayLog.findIndex(function (r) {
    return r.date === dISO && r.tid === tid;
  });
  if (idx === -1) return;
  const rec = state.dayLog[idx];

  // если это была разовая задача — восстановить её в проект
  if (!rec.wasRep) {
    const stillThere = findTaskByTid(tid);
    if (!stillThere) {
      const p = state.projects.find(function (x) { return x.num === rec.projectNum; });
      if (p) {
        if (!Array.isArray(p.tasks)) p.tasks = [];
        p.tasks.push(JSON.parse(JSON.stringify(rec.snapshot)));
      }
    }
  }
  state.dayLog.splice(idx, 1);
  saveState(true);
  renderDay();
  renderCalendar();
}

// ----- перенос задачи -----
function openMoveDialog(tid) {
  const found = findTaskByTid(tid);
  if (!found) return;
  const t = found.task;

  // быстрые кнопки: завтра / +неделя относительно текущей даты задачи (или сегодня)
  const base = t.date || todayISO();
  const baseParts = base.split('-');
  const baseD = new Date(+baseParts[0], +baseParts[1] - 1, +baseParts[2]);
  function plusDays(n) {
    const d = new Date(baseD);
    d.setDate(d.getDate() + n);
    return dateToISO(d);
  }
  const tomorrow = (function () {
    const d = new Date(); d.setDate(d.getDate() + 1);

  })();

  const bodyHtml =
    '<div style="font-size:12.5px;color:var(--text-dim);margin-bottom:10px;">' +
    'Перенос «' + escapeHtml(t.name) + '» — выбери новую дату. Без вины: планируем, а не корим себя.</div>' +
    '<div class="move-quick">' +
      '<button onclick="moveDialogSet(\'' + tomorrow + '\')">Завтра</button>' +
      '<button onclick="moveDialogSet(\'' + plusDays(1) + '\')">+1 день</button>' +
      '<button onclick="moveDialogSet(\'' + plusDays(7) + '\')">+1 неделя</button>' +
    '</div>' +
    '<div class="move-modal-row">' +
      '<div><label>Дата</label>' +
        '<input type="date" id="move-date" value="' + escapeHtml(t.date || todayISO()) + '"></div>' +
      '<div><label>Время (по желанию)</label>' +
        '<input type="time" id="move-time" value="' + escapeHtml(t.time || '') + '"></div>' +
    '</div>';

  openCustomModal('Перенести задачу', bodyHtml, [
    { label: 'Отмена', kind: 'ghost', action: closeModal },
    { label: 'Перенести', kind: 'primary', action: function () {
        const dEl = document.getElementById('move-date');
        const tEl = document.getElementById('move-time');
        applyMove(tid, dEl ? dEl.value : '', tEl ? tEl.value : '');

}

// быстрая кнопка в диалоге переноса — проставляет дату в поле
function moveDialogSet(dateISO) {
  const dEl = document.getElementById('move-date');
  if (dEl) dEl.value = dateISO;
}

function applyMove(tid, newDate, newTime) {
  if (!newDate) { return; }   // дата обязательна

  found.task.date = newDate;

  renderCalendar();
}


// ===== ТАБ «НЕДЕЛЯ» =====
let weekOffset = 0;   // 0 = текущая неделя, -1 прошлая, +1 следующая
let weekOrderMode = false;   // режим перестановки плиток

// понедельник недели с учётом смещения; возвращает Date (локальная полночь)
function weekMonday(offset) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  // getDay(): 0=вс..6=сб; хотим понедельник
  const dow = (d.getDay() + 6) % 7;   // 0=пн..6=вс
  d.setDate(d.getDate() - dow + offset * 7);
  return d;
}
function dateToISO(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
// массив 7 ISO-дат недели
function weekDates(offset) {
  const mon = weekMonday(offset);
  const out = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    out.push(dateToISO(d));
  }
  return out;
}

function weekShift(dir) {
  weekOffset += dir;
  renderWeek();
}
function weekToday() {
  weekOffset = 0;
  renderWeek();
}

// сколько важных задач показывать в плитке до сворачивания
const WEEK_TILE_LIMIT = 6;

function renderWeek() {
  const dates = weekDates(weekOffset);
  const firstISO = dates[0], lastISO = dates[6];
  const todayI = todayISO();

  // ---- подпись диапазона ----
  const mon = weekMonday(weekOffset);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const MON_FULL = ['января','февраля','марта','апреля','мая','июня','июля',
                     'августа','сентября','октября','ноября','декабря'];
  let range;
  if (mon.getMonth() === sun.getMonth()) {
    range = mon.getDate() + '–' + sun.getDate() + ' ' + MON_FULL[mon.getMonth()];
  } else {
    range = mon.getDate() + ' ' + MON_SHORT[mon.getMonth()] + ' – ' +
            sun.getDate() + ' ' + MON_SHORT[sun.getMonth()];
  }
  document.getElementById('week-range').textContent = range;
  let sub = '';
  if (weekOffset === 0) sub = 'текущая неделя';
  else if (weekOffset === -1) sub = 'прошлая неделя';
  else if (weekOffset === 1) sub = 'следующая неделя';
  else if (weekOffset < 0) sub = Math.abs(weekOffset) + ' нед. назад';
  else sub = 'через ' + weekOffset + ' нед.';
  document.getElementById('week-sub').textContent = sub;
  document.getElementById('week-today-btn').classList.toggle('hidden', weekOffset === 0);

  // ---- кнопка режима порядка ----
  const orderBtn = document.getElementById('week-order-btn');
  const orderHint = document.getElementById('week-order-hint');
  if (orderBtn) {
    orderBtn.classList.toggle('on', weekOrderMode);
    orderBtn.textContent = weekOrderMode ? '✓ Готово' : '↕ Порядок плиток';
    orderHint.textContent = weekOrderMode
      ? 'Двигай плитки стрелками ▲▼ — порядок свой, «Обзор» не меняется'
      : '';
  }

  // ---- собираем задачи недели по проектам ----
  // для каждого проекта: dated[] (задачи с датой в этой неделе), rep[] (повторяющиеся)
  let totalDated = 0, totalCrit = 0, totalRep = 0;
  const blocks = [];

  state.projects.forEach(function (p) {
    if (p.status === 'paused') return;   // спящие проекты не показываем
    const dated = [];
    const rep = [];
    (p.tasks || []).forEach(function (t) {
      normalizeTask(t);
      if (t.type === 'rep') {
        rep.push(t);
      } else if (t.date && t.date >= firstISO && t.date <= lastISO) {
        dated.push(t);
      }
    });
    if (!dated.length && !rep.length) return;   // пустые проекты пропускаем
    totalDated += dated.length;
    totalRep += rep.length;
    dated.forEach(function (t) { if (t.priority === 'crit') totalCrit++; });
    blocks.push({ p: p, dated: dated, rep: rep });
  });

  // ---- порядок плиток по weekOrder ----
  blocks.sort(function (a, b) {
    return weekOrderRank(a.p.num) - weekOrderRank(b.p.num);
  });

  // ---- сводка ----
  const summary = document.getElementById('week-summary');
  if (blocks.length) {
    let s = '<span><b>' + totalDated + '</b> ' +
      plural(totalDated,'задача','задачи','задач') + ' с датой</span>';
    if (totalCrit > 0) {
      s += '<span class="ws-crit">🔴 <b>' + totalCrit + '</b> ' +
        plural(totalCrit,'критичная','критичных','критичных') + '</span>';
    }
    s += '<span>в <b>' + blocks.length + '</b> ' +
      plural(blocks.length,'проекте','проектах','проектах') + '</span>';
    summary.innerHTML = s;
  } else {
    summary.innerHTML = '';
  }

  // ---- тело ----
  const body = document.getElementById('week-body');
  if (!blocks.length) {
    body.innerHTML = '<div class="week-empty"><div class="big">🗓️</div>' +
      'На эту неделю задач с датой нет.<br>' +
      'Открой проект и задай задаче дату — она появится здесь.</div>';
    return;
  }

  let h = '<div class="week-tiles">';
  blocks.forEach(function (b, bi) {
    h += renderWeekTile(b, dates, todayI, bi, blocks.length);
  });
  h += '</div>';
  body.innerHTML = h;
}

// ранг проекта в своём порядке плиток; неизвестные — в конец, по номеру
function weekOrderRank(num) {
  const i = state.weekOrder.indexOf(num);
  if (i !== -1) return i;
  return 10000 + num;   // не попавшие в weekOrder — после, стабильно по num
}

function renderWeekTile(b, dates, todayI, bi, bcount) {
  const p = b.p;
  const s = sphereById(p.sphere);
  const color = s ? s.color : '#9a7b30';

  // сортировка задач с датой: по дате, потом по приоритету, потом по времени
  const dated = b.dated.slice().sort(function (a, c) {
    if (a.date !== c.date) return a.date < c.date ? -1 : 1;
    const pa = priorityInfo(a.priority).rank, pc = priorityInfo(c.priority).rank;
    if (pa !== pc) return pa - pc;
    return (a.time || '99:99') < (c.time || '99:99') ? -1 : 1;
  });

  // отбор важных: 🔴+🟡; если их больше лимита — только 🔴
  const critImp = dated.filter(function (t) {
    return t.priority === 'crit' || t.priority === 'imp';
  });
  let shown;
  if (critImp.length > WEEK_TILE_LIMIT) {
    shown = dated.filter(function (t) { return t.priority === 'crit'; });
  } else {
    shown = critImp;
  }
  const hiddenCount = dated.length - shown.length;

  let h = '<div class="week-tile' + (weekOrderMode ? ' ordering' : '') + '"' +
    (weekOrderMode ? '' : ' onclick="openProject(' + p.num + ')"') + '>';
  h += '<div class="week-tile-stripe" style="background:' + color + '"></div>';
  h += '<div class="week-tile-head">';
  if (s) h += '<div class="wt-mark" style="background:' + color + '">' + s.id + '</div>';
  h += '<div class="week-tile-titles">';
  h += '<div class="week-tile-name">' + escapeHtml(p.short) + '</div>';
  h += '<div class="week-tile-sub">' + (s ? escapeHtml(s.name) : '') + '</div>';
  h += '</div>';
  if (p.isKey) h += '<span class="week-tile-keytag">ключ</span>';
  h += '</div>';

  // список важных задач
  if (shown.length) {
    h += '<div class="week-task-list">';
    shown.forEach(function (t) {
      const pri = priorityInfo(t.priority);
      h += '<div class="week-task">';
      h += '<span class="week-task-icon">' + pri.icon + '</span>';
      h += '<div class="week-task-body">';
      h += '<div class="week-task-name">' + escapeHtml(t.name) + '</div>';
      // день недели + время
      const di = dates.indexOf(t.date);
      let dayName = (di >= 0) ? ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'][di] : fmtDateHuman(t.date);
      let cls = 'wtw-day';
      if (t.date === todayI) cls += ' wtw-today';
      else if (t.date < todayI) cls += ' wtw-over';
      let when = '<span class="' + cls + '">' + dayName +
        (t.date === todayI ? ' · сегодня' : '') +
        (t.date < todayI ? ' · просрочено' : '') + '</span>';
      if (t.time) when += ' · ' + t.time;
      h += '<div class="week-task-when">' + when + '</div>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  // свёрнутые задачи
  if (hiddenCount > 0) {
    let note;
    if (shown.length === 0) {
      note = 'обычных задач на неделю: ' + hiddenCount;
    } else {
      note = 'ещё ' + hiddenCount + ' ' +
        plural(hiddenCount,'задача','задачи','задач') + ' на неделю';
    }
    h += '<div class="week-tile-more">+ ' + note + ' — открой проект</div>';
  }

  // повторяющиеся — компактной строкой
  if (b.rep.length) {
    const names = b.rep.map(function (t) { return escapeHtml(t.name); });
    h += '<div class="week-rep-line">↻ <b>Каждый день:</b> ' + names.join(' · ') + '</div>';
  }

  // панель перестановки плитки (режим порядка)
  if (weekOrderMode) {
    h += '<div class="week-tile-order">' +
      '<button class="move-btn" title="Выше" ' + (bi === 0 ? 'disabled' : '') +
        ' onclick="moveWeekTile(' + p.num + ',-1)">▲</button>' +
      '<button class="move-btn" title="Ниже" ' + (bi === bcount - 1 ? 'disabled' : '') +
        ' onclick="moveWeekTile(' + p.num + ',1)">▼</button>' +
      '<span class="wto-label">позиция ' + (bi + 1) + ' из ' + bcount + '</span>' +
      '</div>';
  }

  h += '</div>';
  return h;
}

// ----- режим порядка плиток -----
function toggleWeekOrder() {
  weekOrderMode = !weekOrderMode;
  renderWeek();
}

// синхронизирует weekOrder с текущим набором проектов:
// все непаузные проекты должны быть в списке, в стабильном порядке
function syncWeekOrder() {
  const present = state.projects.map(function (p) { return p.num; });
  // оставляем только существующие, сохраняя порядок
  state.weekOrder = state.weekOrder.filter(function (n) {
    return present.indexOf(n) !== -1;
  });
  // дописываем новые проекты в конец, в порядке state.projects
  present.forEach(function (n) {
    if (state.weekOrder.indexOf(n) === -1) state.weekOrder.push(n);
  });
}

// двигает проект в weekOrder среди ВИДИМЫХ сейчас плиток
function moveWeekTile(num, dir) {
  syncWeekOrder();
  // какие проекты сейчас на экране (в текущем порядке)
  const dates = weekDates(weekOffset);
  const firstISO = dates[0], lastISO = dates[6];
  const visible = [];
  state.projects.forEach(function (p) {
    if (p.status === 'paused') return;
    const has = (p.tasks || []).some(function (t) {
      return t.type === 'rep' ||
        (t.date && t.date >= firstISO && t.date <= lastISO);
    });
    if (has) visible.push(p.num);
  });
  visible.sort(function (a, b) { return weekOrderRank(a) - weekOrderRank(b); });

  const pos = visible.indexOf(num);
  if (pos === -1) return;
  const swapPos = pos + dir;
  if (swapPos < 0 || swapPos >= visible.length) return;
  const other = visible[swapPos];

  // меняем местами num и other в общем массиве weekOrder
  const iA = state.weekOrder.indexOf(num);
  const iB = state.weekOrder.indexOf(other);
  if (iA === -1 || iB === -1) return;
  const tmp = state.weekOrder[iA];
  state.weekOrder[iA] = state.weekOrder[iB];
  state.weekOrder[iB] = tmp;

  saveState(true);
  renderWeek();
}


// ===== ОБЩИЙ РЕНДЕР =====
function renderAll() {
  renderHeader();
  renderTimer();
  renderSphereFilter();
  renderOverview();
  renderWeek();
  renderDay();
  renderCalendar();
  renderTimeLog();
}

// ===== СТАРТ =====
function init() {
  var step = 'старт';
  try {
    step = 'loadState';
    loadState();
    step = 'дата';
    const today = new Date();
    const months = ['января','февраля','марта','апреля','мая','июня','июля',
                     'августа','сентября','октября','ноября','декабря'];
    const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
    const tl = document.getElementById('today-label');
    if (tl) tl.textContent =
      days[today.getDay()] + ', ' + today.getDate() + ' ' + months[today.getMonth()] +
      ' ' + today.getFullYear();
    step = 'renderHeader';       renderHeader();
    step = 'renderTimer';        renderTimer();
    step = 'renderSphereFilter'; renderSphereFilter();
    step = 'renderOverview';     renderOverview();
    step = 'renderWeek';         renderWeek();
    step = 'renderDay';          renderDay();
    step = 'renderCalendar';     renderCalendar();
    step = 'renderTimeLog';      renderTimeLog();
    step = 'showTab';            showTab(state.lastTab || 'week');
    step = 'ticker';             if (state.timer.running) startTicker();
    step = 'saveStatus';         setSaveStatus('Сохранено', false);
  } catch (e) {
    showErrorBar('Не удалось загрузить дашборд. Попробуйте обновить страницу.');
    console.error('Ошибка инициализации на шаге «' + step + '»:', e);
  }
}
document.addEventListener('DOMContentLoaded', init);

</script>
